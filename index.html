<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>КИБЕР-ШТАБ: СИНХРОНИЗАЦИЯ</title><style>
body{font-family:monospace;padding:20px;background:#000;color:#0f0;margin:0;overflow-x:hidden}
#matrix-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;opacity:0.3}
#login-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:100;display:flex;align-items:center;justify-content:center}
.login-box{border:2px solid #0f0;padding:20px;border-radius:12px;text-align:center;background:#000;box-shadow:0 0 20px #0f0}
#main-content{filter:blur(15px);pointer-events:none;transition:1s}
.container{max-width:800px;margin:20px auto;background:rgba(10,10,10,.95);padding:20px;border:2px solid #0f0;border-radius:12px}
.box{background:rgba(0,255,0,.05);padding:15px;border-radius:8px;border:1px double #0f0;margin-top:15px;text-align:center}
#click-btn{width:80px;height:80px;border-radius:50%;border:4px solid #0f0;background:#000;color:#0f0;font-size:2em;cursor:pointer;outline:none}
button{background:#0f0;color:#000;border:none;padding:8px;font-weight:bold;cursor:pointer;border-radius:5px;text-transform:uppercase;width:100%}
input{background:#000;color:#0f0;border:1px solid #0f0;padding:8px;border-radius:4px;outline:none;margin:5px 0;width:80%;text-align:center}
.wiki-section{background:#1a1a1a;padding:15px;border-radius:8px;margin-top:20px;border:1px solid #444;height:200px;overflow-y:scroll;font-size:.85em}
#dr-banner{display:none;background:linear-gradient(45deg,#f0f,#0ff);color:#fff;padding:10px;text-align:center;font-weight:bold;border-radius:8px;margin-bottom:10px;border:2px solid #fff}
</style></head><body><canvas id="matrix-canvas"></canvas>
<div id="login-overlay"><div class="login-box"><h2>IDENTITY SCAN</h2><input type="text" id="user-login" placeholder="LOGIN..."><br><button onclick="confirmAccess()">ВХОД</button></div></div>
<div id="main-content" class="container"><div id="dr-banner">🎂 ПРАЗДНИК ЕГОРА! ВСЁ БЕСПЛАТНО! Код: EGOR_DR</div>
<h1>ШТАБ: <span id="display-name">...</span></h1>
<div class="box"><h2 id="score-text">0</h2><p id="lvl-text" style="color:#fc0">LVL: 0</p><button onclick="mineData()" id="click-btn">⚡</button><p>Авто: +<span id="auto-val">0</span>/сек</p></div>

<!-- ПЕРЕНОС ДАННЫХ -->
<div class="box" style="border-color:#0ff"><h3>☁️ ПЕРЕНОС МЕЖДУ УСТРОЙСТВАМИ</h3><p style="font-size:.7em">Чтобы перенести очки с ПК на телефон:</p>
<button onclick="exportSave()" style="background:#0ff;color:#000;width:auto;padding:5px 15px">1. ПОЛУЧИТЬ КОД (НА ПК)</button>
<input type="text" id="import-code" placeholder="ВСТАВЬ КОД СЮДА (НА ТЕЛЕФОНЕ)" style="width:90%">
<button onclick="importSave()" style="background:#f0f;color:#fff;width:auto;padding:5px 15px">2. ЗАГРУЗИТЬ (НА ТЕЛЕФОНЕ)</button></div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div class="box" style="border-color:#0080ff"><h3>🔑 ПРОМО</h3><input type="text" id="promo-input" placeholder="КОД"><button onclick="usePromo()">OK</button></div>
<div class="box" style="border-color:#fff"><h3>📤 ПЕРЕВОД</h3><input type="text" id="target-p" placeholder="ИМЯ"><button onclick="transferXP()">SEND 10M</button></div></div>
<div class="box" style="border-color:#f0f"><h3>🛒 МАГАЗИН</h3><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
<button onclick="buy('auto')">GTX 1070</button><button onclick="buy('quant')">КВАНТ ПК</button></div></div>
<div class="box" style="border-color:#fc0"><h3>🏆 ТОП</h3><div id="board" style="text-align:left;font-size:.8em"></div></div>
<footer style="text-align:center;margin-top:20px;font-size:.8em">DEV: МИША | SUP: ЕГОР, ИГНАТ, КИРИЛЛ</footer></div>
<script>
let userName=localStorage.getItem('m_user_name'),score=0,autoP=0,clickP=1,isDR=false,usedPr=[];
function checkDR(){let d=new Date();if(d.getMonth()===4&&(d.getDate()===11||d.getDate()===12)){document.getElementById('dr-banner').style.display='block';isDR=true}}
function loadData(){const keys=['m_sc_final','hackerScore','m_sc','m_sc_100'];keys.forEach(k=>{let s=parseInt(localStorage.getItem(k))||0;if(s>score)score=s});autoP=parseInt(localStorage.getItem('m_au_final'))||0;clickP=parseInt(localStorage.getItem('m_cl_final'))||1;usedPr=JSON.parse(localStorage.getItem('m_pr'))||[]}
function confirmAccess(){let i=document.getElementById('user-login').value.trim();if(i.length<2)return;userName=i;localStorage.setItem('m_user_name',userName);document.getElementById('login-overlay').style.display='none';document.getElementById('main-content').style.filter='none';document.getElementById('main-content').style.pointerEvents='auto';document.getElementById('display-name').innerText=userName.toUpperCase();loadData();updateUI()}
function fmt(n){if(n>=1e9)return (n/1e9).toFixed(2)+'Млрд';if(n>=1e6)return (n/1e6).toFixed(1)+'М';if(n>=1e3)return (n/1e3).toFixed(1)+'к';return Math.floor(n)}
function updateUI(){document.getElementById('score-text').innerText=fmt(score);document.getElementById('auto-val').innerText=fmt(autoP);document.getElementById('lvl-text').innerText="LVL: "+Math.floor(score/1e5);localStorage.setItem('m_sc_final',score);localStorage.setItem('m_au_final',autoP);localStorage.setItem('m_cl_final',clickP);localStorage.setItem('m_pr',JSON.stringify(usedPr));drawBoard()}
function mineData(){score+=clickP;updateUI()}
function buy(t){let c=isDR?0:(t==='auto'?100:1e6);if(score>=c){if(!isDR)score-=c;if(t==='auto')autoP+=5;else autoP+=5e4;updateUI()}}
function usePromo(){let i=document.getElementById('promo-input').value.toUpperCase().trim();if(usedPr.includes(i))return;if(i==='MISHA2025'){score+=5e5;reward(i)}if(i==='EGOR_DR'&&isDR){score+=1e8;reward(i)}}
function reward(i){usedPr.push(i);document.getElementById('promo-input').value="";alert("OK!");updateUI()}
function transferXP(){let t=document.getElementById('target-p').value.trim();if(score>=1e7){let r=JSON.parse(localStorage.getItem('m_board_final'))||[],i=r.findIndex(p=>p.name.toLowerCase()===t.toLowerCase());if(i!==-1){score-=1e7;r[i].score+=1e7;localStorage.setItem('m_board_final',JSON.stringify(r));updateUI()}}}
function drawBoard(){let r=JSON.parse(localStorage.getItem('m_board_final'))||[];if(userName){let e=r.findIndex(p=>p.name.toLowerCase()===userName.toLowerCase());if(e!==-1){if(score>r[e].score)r[e].score=score}else{r.push({name:userName,score:score})}}r.sort((a,b)=>b.score-a.score);localStorage.setItem('m_board_final',JSON.stringify(r.slice(0,10)));document.getElementById('board').innerHTML=r.map((p,idx)=>`${idx+1}. ${p.name}: ${fmt(p.score)}`).join('<br>')}

// --- ФУНКЦИИ ПЕРЕНОСА ---
function exportSave(){
    let data = btoa(JSON.stringify({s:score, a:autoP, c:clickP, n:userName}));
    prompt("СКОПИРУЙ ЭТОТ КОД И ВСТАВЬ НА ТЕЛЕФОНЕ:", data);
}
function importSave(){
    let code = document.getElementById('import-code').value.trim();
    try {
        let data = JSON.parse(atob(code));
        score = data.s; autoP = data.a; clickP = data.c; userName = data.n;
        localStorage.setItem('m_user_name', userName);
        alert("ДАННЫЕ ЗАГРУЖЕНЫ! ПЕРЕЗАГРУЗКА...");
        updateUI();
    } catch(e) { alert("ОШИБКА КОДА!"); }
}

const mC=document.getElementById('matrix-canvas'),mX=mC.getContext('2d');mC.width=window.innerWidth;mC.height=window.innerHeight;const chars="0123456789ABCDEF",drops=Array(Math.floor(mC.width/16)).fill(1);
function drawM(){mX.fillStyle="rgba(0,0,0,0.1)";mX.fillRect(0,0,mC.width,mC.height);mX.fillStyle="#0F0";mX.font="16px arial";drops.forEach((y,i)=>{mX.fillText(chars[Math.floor(Math.random()*chars.length)],i*16,y*16);if(y*16>mC.height&&Math.random()>.975)drops[i]=0;drops[i]++})}
setInterval(drawM,40);setInterval(()=>{if(autoP>0){score+=autoP;updateUI()}},1000);checkDR();if(userName)confirmAccess();</script></body></html>
