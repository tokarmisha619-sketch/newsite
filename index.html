<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>HAKCLIKER 3.1</title>
    <style>
        body{font-family:monospace;background:#000;color:#0f0;margin:0;padding:10px;overflow:hidden;touch-action:none}
        #matrix-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;opacity:0.2}
        .container{max-width:600px;margin:0 auto;background:rgba(0,10,0,0.85);padding:15px;border:2px solid #0f0;border-radius:10px;height:95vh;overflow-y:auto}
        .box{background:rgba(0,255,0,0.05);padding:15px;border:1px double #0f0;border-radius:8px;margin-bottom:15px;text-align:center;position:relative}
        .gold-nick { color: #ffcc00 !important; text-shadow: 0 0 10px #ffcc00; font-weight: bold; }
        
        /* ЧАСТИЦЫ */
        .particle { position: fixed; pointer-events: none; z-index: 10000; color: #0f0; font-size: 1.2em; animation: pFly 0.8s ease-out forwards; }
        @keyframes pFly { 0% { opacity: 1; transform: translate(0,0); } 100% { opacity: 0; transform: translate(var(--dx), var(--dy)) rotate(360deg); } }

        /* АДМИНКА */
        #admin-modal { position: fixed; top: 40px; left: 10px; background: #111; border: 3px solid #f00; z-index: 3000; width: 260px; border-radius: 15px; display: none; box-shadow: 0 0 30px #f00; }
        #admin-header { background: #f00; color: #fff; padding: 10px; cursor: grab; text-align: center; font-weight: bold; border-radius: 12px 12px 0 0; user-select: none; }
        .admin-body { padding: 10px; display: grid; gap: 5px; max-height: 400px; overflow-y: auto; }
        
        button{background:#0f0;color:#000;border:none;padding:8px;font-weight:bold;cursor:pointer;border-radius:5px;text-transform:uppercase;width:100%;margin-top:5px;font-size:0.7em}
        input{background:#000;color:#0f0;border:1px solid #0f0;padding:8px;border-radius:4px;width:90%;text-align:center;margin:5px 0;outline:none}
        #click-btn{width:70px;height:70px;border-radius:50%;border:4px solid #0f0;background:#000;color:#0f0;font-size:1.5em;cursor:pointer;box-shadow:0 0 15px #0f0;margin:10px; transition: 0.1s;}
        #click-btn:active { transform: scale(0.9); }

        #leaderboard-container { height: 250px; overflow-y: scroll; border: 1px solid #040; background: rgba(0,0,0,0.8); padding: 5px; margin-top: 10px; }
        .leader-item { display: flex; justify-content: space-between; padding: 4px; border-bottom: 1px solid #111; font-size: 0.65em; }
        .my-pos { background: rgba(0,255,0,0.3) !important; border: 1px solid #0f0; color: #fff; }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>

    <div id="admin-modal">
        <div id="admin-header">✋ ТЯНИ ПАНЕЛЬ</div>
        <div class="admin-body">
            <button onclick="getRTX(6000, 1e6)" style="background:#fc0">🔥 RTX 6000</button>
            <button onclick="getRTX(7000, 1e7)" style="background:#f0f; color:#fff">🌌 RTX 7000</button>
            <button onclick="getRTX(8000, 5e8)" style="background:#0cf">👑 RTX 8000</button>
            <button onclick="getRTX(9000, 1e12)" style="background:#0f0">🚀 RTX 9000</button>
            <button onclick="getRTX(10000, 5e17)" style="background:linear-gradient(45deg,#0f0,#ff0)">⚡ RTX 10000</button>
            <button onclick="getRTX(15000, 1e21)" style="background:#f00; color:#fff">💎 RTX 15000</button>
            <button onclick="getRTX('INFINITY', 1e30)" style="background:linear-gradient(45deg, #000, #fff); color:#f00">🌌 RTX INFINITY</button>
            <hr>
            <button onclick="isGold=true; updateUI()" style="background:#ffcc00">👑 GOLD NAME</button>
            <button onclick="score += 1e24; updateUI()" style="background:#0f0">💰 +1Sx XP</button>
            <button onclick="fullReset()" style="background:#f00; color:#fff">🗑️ ПОЛНЫЙ СБРОС</button>
            <button onclick="document.getElementById('admin-modal').style.display='none'">CLOSE</button>
        </div>
    </div>

    <div id="login-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:2000; display:flex; align-items:center; justify-content:center">
        <div class="box" style="width:250px; background:#000;">
            <h2>HAKCLIKER OS</h2>
            <input type="text" id="user-login" placeholder="LOGIN...">
            <button onclick="confirmAccess()">START</button>
        </div>
    </div>

    <div id="main-content" class="container" style="display:none">
        <h2 style="text-align:center;">ROOT: <span id="display-name" onclick="openAdmin()" style="cursor:pointer; text-decoration:underline">...</span></h2>
        <div class="box">
            <h1 id="score-text">0</h1>
            <button onclick="mineData(event)" id="click-btn">⚡</button>
            <p id="lvl-text" style="color:#fc0;">LVL: 0</p>
            <p style="font-size:0.8em">AUTO: +<span id="auto-val">0</span>/sec</p>
        </div>
        <div class="box" style="border-color: #0cf;">
            <h3 style="margin:0">🏆 LIVE TOP 100</h3>
            <div id="leaderboard-container"><div id="leaderboard"></div></div>
        </div>
    </div>

    <script>
        let score=0, autoP=0, clickP=1, userName='', isGold=false;
        let bots = [];

        function initBots() {
            const names = ["Satoshi", "Musk", "Anonymous", "Pavel", "Hacker", "Shadow", "Ghost", "Neo"];
            for(let i=1; i<=100; i++) {
                bots.push({
                    name: names[Math.floor(Math.random()*names.length)] + "_" + i,
                    score: Math.floor(Math.random() * 5000),
                    power: Math.floor(Math.random() * 1000000) + 10000
                });
            }
        }
        initBots();

        function fullReset() {
            localStorage.clear();
            window.location.reload();
        }

        function createParticles(e) {
            const chars = ["0", "1", "{", "}", ";", "=>", "[]"];
            for(let i=0; i<6; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.innerText = chars[Math.floor(Math.random()*chars.length)];
                p.style.left = (e.clientX || window.innerWidth/2) + 'px';
                p.style.top = (e.clientY || window.innerHeight/2) + 'px';
                p.style.setProperty('--dx', (Math.random()-0.5)*200 + 'px');
                p.style.setProperty('--dy', (Math.random()-0.5)*200 + 'px');
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 800);
            }
        }

        function mineData(e) { score += clickP; createParticles(e); updateUI(); }
        function getRTX(m, p) { autoP += p; updateUI(); alert("RTX " + m + " ACTIVE!"); }
        function openAdmin() { if(userName.toLowerCase()==='миша') document.getElementById('admin-modal').style.display='block'; }

        function confirmAccess() {
            let i = document.getElementById('user-login').value.trim();
            if(i.length < 2) return;
            userName = i;
            document.getElementById('login-overlay').style.display='none';
            document.getElementById('main-content').style.display='block';
            updateUI();
        }

        function updateUI() {
            let nTag = document.getElementById('display-name');
            nTag.innerText = userName.toUpperCase();
            if (isGold) nTag.className = 'gold-nick';
            document.getElementById('score-text').innerText = Math.floor(score).toLocaleString();
            document.getElementById('auto-val').innerText = autoP.toLocaleString();
            document.getElementById('lvl-text').innerText = "LVL: " + Math.floor(Math.sqrt(score/100));
            
            let all = [...bots, {name:userName, score:score}].sort((a,b)=>b.score-a.score);
            let html = '';
            all.forEach((p, i) => {
                let isMe = p.name === userName;
                let gClass = (isMe && isGold) ? 'gold-nick' : '';
                html += `<div class="leader-item ${isMe?'my-pos':''} ${gClass}"><span>#${i+1} ${p.name}</span><span>${Math.floor(p.score).toLocaleString()} XP</span></div>`;
            });
            document.getElementById('leaderboard').innerHTML = html;
            save();
        }

        function save() {
            localStorage.setItem('h_score', score);
            localStorage.setItem('h_auto', autoP);
            localStorage.setItem('h_user', userName);
            localStorage.setItem('h_gold', isGold);
        }

        setInterval(() => {
            if(!userName) return;
            bots.forEach(b => b.score += b.power / 10);
            score += autoP / 10;
            updateUI();
        }, 100);

        // DRAG ADMIN
        const modal = document.getElementById("admin-modal");
        const header = document.getElementById("admin-header");
        let active = false, xOff = 0, yOff = 0, startX, startY;
        function dS(e) {
            let cx = e.type === "touchstart" ? e.touches.clientX : e.clientX;
            let cy = e.type === "touchstart" ? e.touches.clientY : e.clientY;
            startX = cx - xOff; startY = cy - yOff;
            if (e.target === header) active = true;
        }
        function dM(e) {
            if (active) {
                let cx = e.type === "touchmove" ? e.touches.clientX : e.clientX;
                let cy = e.type === "touchmove" ? e.touches.clientY : e.clientY;
                xOff = cx - startX; yOff = cy - startY;
                modal.style.transform = `translate(${xOff}px, ${yOff}px)`;
            }
        }
        document.addEventListener("touchstart", dS); document.addEventListener("touchmove", dM); 
        document.addEventListener("mousedown", dS); document.addEventListener("mousemove", dM);
        document.addEventListener("mouseup", () => active = false); document.addEventListener("touchend", () => active = false);

        // MATRIX
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width / 20)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0";
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random() * 2), i * 20, y * 20);
                if (y * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 50);

        const saved = localStorage.getItem('h_user');
        if(saved) { 
            userName = saved; score = Number(localStorage.getItem('h_score')) || 0;
            autoP = Number(localStorage.getItem('h_auto')) || 0; 
            isGold = localStorage.getItem('h_gold') === 'true';
            confirmAccess();
        }
    </script>
</body>
</html>
