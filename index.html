<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>HAKCLIKER 3.1: ULTIMATE BATTLE</title>
    <style>
        body{font-family:monospace;background:#000;color:#0f0;margin:0;padding:10px;overflow:hidden;touch-action:none}
        #matrix-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;opacity:0.2}
        .container{max-width:600px;margin:0 auto;background:rgba(0,10,0,0.85);padding:15px;border:2px solid #0f0;border-radius:10px;height:95vh;overflow-y:auto}
        .box{background:rgba(0,255,0,0.05);padding:15px;border:1px double #0f0;border-radius:8px;margin-bottom:15px;text-align:center;position:relative}
        .gold-nick { color: #ffcc00 !important; text-shadow: 0 0 10px #ffcc00; font-weight: bold; }
        .particle { position: fixed; pointer-events: none; z-index: 10000; color: #0f0; font-size: 1.2em; animation: pFly 0.8s ease-out forwards; }
        @keyframes pFly { 0% { opacity: 1; transform: translate(0,0); } 100% { opacity: 0; transform: translate(var(--dx), var(--dy)) rotate(360deg); } }
        #admin-modal { position: fixed; top: 40px; left: 10px; background: #111; border: 3px solid #f00; z-index: 3000; width: 260px; border-radius: 15px; display: none; box-shadow: 0 0 30px #f00; }
        #admin-header { background: #f00; color: #fff; padding: 10px; cursor: grab; text-align: center; font-weight: bold; border-radius: 12px 12px 0 0; user-select: none; }
        .admin-body { padding: 10px; display: grid; gap: 5px; max-height: 400px; overflow-y: auto; }
        button{background:#0f0;color:#000;border:none;padding:8px;font-weight:bold;cursor:pointer;border-radius:5px;text-transform:uppercase;width:100%;margin-top:5px;font-size:0.7em}
        input{background:#000;color:#0f0;border:1px solid #0f0;padding:5px;border-radius:4px;width:90%;text-align:center;margin:5px 0;outline:none}
        #click-btn{width:70px;height:70px;border-radius:50%;border:4px solid #0f0;background:#000;color:#0f0;font-size:1.5em;cursor:pointer;box-shadow:0 0 15px #0f0;margin:10px;}
        #leaderboard-container { height: 200px; overflow-y: scroll; border: 1px solid #040; background: rgba(0,0,0,0.8); padding: 5px; margin-top: 10px; }
        .leader-item { display: flex; justify-content: space-between; padding: 4px; border-bottom: 1px solid #111; font-size: 0.6em; }
        .my-pos { background: rgba(0,255,0,0.3) !important; border: 1px solid #0f0; color: #fff; }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>

    <!-- АДМИНКА -->
    <div id="admin-modal">
        <div id="admin-header">✋ ADMIN CONTROL</div>
        <div class="admin-body">
            <button onclick="getRTX(6000, 1e6)" style="background:#fc0">🔥 RTX 6000</button>
            <button onclick="getRTX(7000, 1e7)" style="background:#f0f; color:#fff">🌌 RTX 7000</button>
            <button onclick="getRTX(8000, 5e8)" style="background:#0cf">👑 RTX 8000</button>
            <button onclick="getRTX(9000, 1e12)" style="background:#0f0">🚀 RTX 9000</button>
            <button onclick="getRTX(10000, 5e17)" style="background:linear-gradient(45deg,#0f0,#ff0)">⚡ RTX 10000</button>
            <button onclick="getRTX(15000, 1e21)" style="background:#f00; color:#fff">💎 RTX 15000</button>
            <button onclick="getRTX('INFINITY', 1e30)" style="background:linear-gradient(45deg, #000, #fff); color:#f00">🌌 RTX INFINITY</button>
            <hr>
            <button onclick="isGold=true; saveGame(); updateUI(); playBuyMelody();" style="background:#ffcc00">👑 GOLD NAME</button>
            <button onclick="score += 1e24; saveGame(); updateUI(); playBuyMelody();" style="background:#0f0">💰 +1Sx XP</button>
            <button onclick="fullReset()" style="background:#f00; color:#fff">🗑️ СБРОС (RESET)</button>
            <button onclick="document.getElementById('admin-modal').style.display='none'">CLOSE</button>
        </div>
    </div>

    <div id="login-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:2000; display:flex; align-items:center; justify-content:center">
        <div class="box" style="width:250px; background:#000;">
            <h2>HAKCLIKER OS</h2>
            <input type="text" id="user-login" placeholder="LOGIN...">
            <button onclick="confirmAccess()">START</button>
        </div>
    </div>

    <div id="main-content" class="container" style="display:none">
        <h2 style="text-align:center;">ШТАБ: <span id="display-name" onclick="openAdmin()" style="cursor:pointer; text-decoration:underline">...</span></h2>
        
        <div class="box">
            <h1 id="score-text">0</h1>
            <button onclick="mineData(event)" id="click-btn">⚡</button>
            <p style="font-size:0.8em; margin:0">АВТО: +<span id="auto-val">0</span>/sec</p>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div class="box" style="border-color: #f0f;">
                <h3>🛒 МАГАЗИН</h3>
                <button onclick="buyCase()" style="background:#f0f; color:#fff">🌈 КЕЙС RTX (10K)</button>
                <button onclick="buyAntenna()" style="background:#0080ff; color:#fff">📡 АНТЕННА (1M)</button>
            </div>
            <div class="box" style="border-color: #0cf;">
                <h3>📤 ПЕРЕВОД</h3>
                <input type="text" id="t-name" placeholder="КОМУ (НИК)">
                <button onclick="transferMoney()" style="background:#0cf; color:#000">ОТПРАВИТЬ XP</button>
            </div>
        </div>

        <div class="box" style="border-color: #fc0;">
            <h3 style="margin:0">🏆 LIVE TOP 100</h3>
            <div id="leaderboard-container"><div id="leaderboard"></div></div>
        </div>
    </div>

    <script>
        let score = parseFloat(localStorage.getItem('hak_score')) || 0;
        let autoP = parseFloat(localStorage.getItem('hak_autoP')) || 0;
        let clickP = 1, userName = localStorage.getItem('hak_name') || '', isGold = localStorage.getItem('hak_gold') === 'true';
        let bots = [];
        let audioCtx = null;

        // Базовая музыкальная функция
        function playSound(frequency, type, duration, startTimeOffset = 0) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                
                osc.type = type || 'sine'; 
                osc.frequency.setValueAtTime(frequency, audioCtx.currentTime + startTimeOffset);
                
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime + startTimeOffset);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + startTimeOffset + duration);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start(audioCtx.currentTime + startTimeOffset);
                osc.stop(audioCtx.currentTime + startTimeOffset + duration);
            } catch (e) {}
        }

        // РЕАЛИСТИЧНЫЙ ТРЕСК ДОЗИМЕТРА ГЕЙГЕРА (БЕЛЫЙ ШУМ) ДЛЯ КЛИКОВ
        function playGeigerClick() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();

                // Делаем несколько случайных быстрых тресков при одном нажатии
                let clicksCount = Math.floor(Math.random() * 3) + 2; 
                
                for (let i = 0; i < clicksCount; i++) {
                    let timeOffset = Math.random() * 0.08; // Случайный разброс времени треска
                    
                    let bufferSize = audioCtx.sampleRate * 0.01; // Очень короткий звук
                    let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                    let data = buffer.getChannelData(0);
                    
                    // Заполняем буфер шумом
                    for (let j = 0; j < bufferSize; j++) {
                        data[j] = Math.random() * 2 - 1;
                    }
                    
                    let noise = audioCtx.createBufferSource();
                    noise.buffer = buffer;
                    
                    // Фильтр, чтобы звук был глухим и пластиковым, как в Сталкере
                    let filter = audioCtx.createBiquadFilter();
                    filter.type = 'bandpass';
                    filter.frequency.value = 1200; 
                    
                    let gain = audioCtx.createGain();
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime + timeOffset);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + timeOffset + 0.005);
                    
                    noise.connect(filter);
                    filter.connect(gain);
                    gain.connect(audioCtx.destination);
                    
                    noise.start(audioCtx.currentTime + timeOffset);
                }
            } catch(e) {}
        }

        // СТАЛКЕРСКАЯ МЕЛОДИЯ УСПЕШНОЙ ПОКУПКИ: ТУ-ТУ-ТУ-У
        function playBuyMelody() {
            const now = 0;
            playSound(293.66, 'sawtooth', 0.08, now);       
            playSound(293.66, 'sawtooth', 0.08, now + 0.1); 
            playSound(293.66, 'sawtooth', 0.08, now + 0.2); 
            playSound(220.00, 'sawtooth', 0.25, now + 0.3); 
        }

        function playErrorMelody() {
            const now = 0;
            playSound(130, 'sawtooth', 0.15, now);
            playSound(100, 'sawtooth', 0.25, now + 0.15);
        }

        function initBots() {
            const names = ["Satoshi", "Elon", "Anonymous", "Pavel", "Hacker", "Shadow", "Ghost", "Neo"];
            for(let i=1; i<=100; i++) {
                bots.push({
                    name: names[Math.floor(Math.random()*names.length)] + "_" + i,
                    score: Math.floor(Math.random() * 5000),
                    power: Math.floor(Math.random() * 10) + 1
                });
            }
        }
        initBots();

        function saveGame() {
            localStorage.setItem('hak_score', score);
            localStorage.setItem('hak_autoP', autoP);
            localStorage.setItem('hak_name', userName);
            localStorage.setItem('hak_gold', isGold);
        }

        function confirmAccess() {
            let inputName = document.getElementById('user-login').value;
            if(!userName) userName = inputName || 'Guest';
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('display-name').innerText = userName;
            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            updateUI();
            setInterval(() => { score += autoP/10; updateBots(); updateUI(); }, 100);
            setInterval(saveGame, 2000);
            initMatrix();
        }

        function updateUI() {
            document.getElementById('score-text').innerText = Math.floor(score).toLocaleString();
            document.getElementById('auto-val').innerText = autoP.toLocaleString();
            
            let nameSpan = document.getElementById('display-name');
            if (isGold) {
                nameSpan.classList.add('gold-nick');
            } else {
                nameSpan.classList.remove('gold-nick');
            }

            let fullList = [...bots, { name: userName, score: score, isPlayer: true }];
            fullList.sort((a, b) => b.score - a.score);

            let html = '';
            fullList.forEach((item, index) => {
                if (index < 100) {
                    let styleClass = item.isPlayer ? 'my-pos' : '';
                    let nickStyle = (item.isPlayer && isGold) ? 'class="gold-nick"' : '';
                    html += `<div class="leader-item ${styleClass}">
                        <span ${nickStyle}>#${index + 1} ${item.name}</span>
                        <span>${Math.floor(item.score).toLocaleString()} XP</span>
                    </div>`;
                }
            });
            document.getElementById('leaderboard').innerHTML = html;
        }

        function mineData(e) {
            score += clickP;
            playGeigerClick(); // При клике трещит дозиметр!
            createParticle(e.clientX, e.clientY, "+" + clickP);
            updateUI();
        }

        function createParticle(x, y, text) {
            let p = document.createElement('div');
            p.className = 'particle';
            p.innerText = text;
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            let dx = (Math.random() - 0.5) * 100;
            let dy = (Math.random() - 0.5) * 100 - 50;
            p.style.setProperty('--dx', dx + 'px');
            p.style.setProperty('--dy', dy + 'px');
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
        }

        function buyCase() {
            if (score >= 10000) {
                score -= 10000;
                clickP += 5;
                playBuyMelody(); 
                alert('📦 Кейс открыт! Сила клика увеличена на +5!');
                updateUI();
            } else {
                playErrorMelody(); 
                alert('Не хватает XP! Нужно 10,000 XP.');
            }
        }

        function buyAntenna() {
            if (score >= 1000000) {
                score -= 1000000;
                autoP += 50;
                playBuyMelody(); 
                alert('📡 Антенна установлена! Авто-майнинг увеличен на +50/сек!');
                updateUI();
            } else {
                playErrorMelody(); 
                alert('Не хватает XP! Нужно 1,000,000 XP.');
            }
        }

        function transferMoney() {
            let target = document.getElementById('t-name').value;
            if (!target) {
                playErrorMelody();
                return alert('Введите имя получателя!');
            }
            playBuyMelody();
            alert(`Успешно переведено пользователю ${target}!`);
        }

        function openAdmin() {
            playSound(300, 'sawtooth', 0.1);
            document.getElementById('admin-modal').style.display = 'block';
        }

        function getRTX(model, reward) {
            autoP += reward;
            playBuyMelody();
            alert(`🚀 Установлена видеокарта RTX ${model}! Прирост скорости: +${reward.toLocaleString()}/sec!`);
            saveGame();
            updateUI();
        }

        function fullReset() {
            playErrorMelody();
            localStorage.clear();
            score = 0; autoP = 0; clickP = 1; isGold = false; userName = '';
            location.reload();
        }

        function updateBots() {
            bots.forEach(bot => {
                bot.score += bot.power * 0.1;
                if(Math.random() > 0.95) bot.power += Math.floor(Math.random() * 5);
            });
        }

        function initMatrix() {
            const canvas = document.getElementById('matrix-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&";
            const fontSize = 10;
            const columns = canvas.width / fontSize;
            const drops = Array(Math.floor(columns)).fill(1);

            function draw() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#0f0';
                ctx.font = fontSize + 'px monospace';
                for (let i = 0; i < drops.length; i++) {
                    const text = letters[Math.floor(Math.random() * letters.length)];
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }
            setInterval(draw, 33);
        }
    </script>
</body>
</html>
