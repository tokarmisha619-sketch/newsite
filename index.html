<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>HAKCLIKER 3.1: COMPETITION</title>
    <style>
        body{font-family:monospace;background:#000;color:#0f0;margin:0;padding:10px;overflow:hidden;touch-action:none}
        #matrix-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;opacity:0.2}
        #login-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:1000;display:flex;align-items:center;justify-content:center}
        .login-box{border:2px solid #0f0;padding:20px;border-radius:10px;text-align:center;background:#000;box-shadow:0 0 20px #0f0}
        #main-content{filter:blur(15px);transition:1s;pointer-events:none}
        .container{max-width:600px;margin:0 auto;background:rgba(0,0,0,0.9);padding:15px;border:2px solid #0f0;border-radius:10px;height:95vh;overflow-y:auto}
        .box{background:rgba(0,255,0,0.05);padding:15px;border:1px double #0f0;border-radius:8px;margin-bottom:15px;text-align:center}
        #click-btn{width:80px;height:80px;border-radius:50%;border:4px solid #0f0;background:#000;color:#0f0;font-size:2em;cursor:pointer;box-shadow:0 0 15px #0f0;margin:10px}
        button{background:#0f0;color:#000;border:none;padding:10px;font-weight:bold;cursor:pointer;border-radius:5px;text-transform:uppercase;width:100%;margin-top:5px}
        
        /* ТАБЛИЦА ЛИДЕРОВ */
        .leaderboard { background: rgba(0,20,0,0.8); border: 1px solid #0f0; padding: 10px; border-radius: 5px; text-align: left; }
        .leader-item { display: flex; justify-content: space-between; padding: 4px; border-bottom: 1px solid #040; font-size: 0.8em; }
        .my-pos { background: #0f0 !important; color: #000 !important; font-weight: bold; }

        /* АДМИНКА */
        #admin-modal { position: fixed; top: 30px; left: 10px; background: #111; border: 3px solid #0f0; z-index: 3000; width: 260px; border-radius: 15px; display: none; }
        #admin-header { background: #0f0; color: #000; padding: 8px; cursor: grab; text-align: center; font-weight: bold; border-radius: 12px 12px 0 0; }
        .admin-body { padding: 10px; display: grid; gap: 5px; }
        #admin-btn { display:none; background:#f00; color:#fff; border:2px solid #fff; margin-bottom: 5px;}
        
        #status-box { position: fixed; top: 80px; right: 10px; width: 110px; background: rgba(0,30,0,0.9); border: 1px solid #0f0; padding: 5px; font-size: 0.6em; border-radius: 5px; z-index: 500; text-align: center; }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>

    <div id="status-box">
        <div style="color: #0f0; font-weight: bold;">RANK</div>
        <div id="rank-text">ROOKIE</div>
        <div id="pos-text">#5</div>
    </div>

    <div id="admin-modal">
        <div id="admin-header">✋ ТЯНИ ПАНЕЛЬ</div>
        <div class="admin-body">
            <button onclick="getRTX(6000, 1e6)" style="background:#fc0;">🔥 RTX 6000</button>
            <button onclick="getRTX(7000, 1e7)" style="background:#f0f; color:#fff;">🌌 RTX 7000</button>
            <button onclick="getRTX(8000, 5e8)" style="background:#0cf;">👑 RTX 8000</button>
            <button onclick="getRTX(9000, 1e12)" style="background:linear-gradient(45deg, #f00, #fff);">🚀 RTX 9000</button>
            <button onclick="score += 1e15; updateUI()" style="background:#0f0;">💰 +1 КВАДРИЛЛИОН</button>
            <button onclick="localStorage.clear(); location.reload();" style="background:#f00; color:#fff;">🗑️ СБРОС</button>
            <button onclick="document.getElementById('admin-modal').style.display='none'">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="login-overlay"><div class="login-box"><h2>HAKCLIKER 3.1</h2><input type="text" id="user-login" placeholder="НИК..."><button onclick="confirmAccess()">START</button></div></div>

    <div id="main-content" class="container">
        <button id="admin-btn" onclick="document.getElementById('admin-modal').style.display='block'">⚠️ ADMIN PANEL</button>
        <h2 style="text-align:center;">ШТАБ: <span id="display-name">...</span></h2>
        
        <div class="box">
            <h1 id="score-text">0</h1>
            <button onclick="mineData()" id="click-btn">⚡</button>
            <p id="lvl-text" style="color:#fc0;">LVL: 0</p>
            <p style="font-size:0.8em">AUTO: +<span id="auto-val">0</span>/sec</p>
        </div>

        <div class="box" style="border-color: #0cf;">
            <h3 style="margin: 0 0 10px 0;">🏆 LIVE TOURNAMENT</h3>
            <div id="leaderboard" class="leaderboard"></div>
        </div>
    </div>

    <script>
        let score=0, autoP=0, clickP=1, userName='', isGold=false;
        let competitors = [
            {name: "Elon Musk 🚀", score: 1e12, speed: 5e8},
            {name: "Anonymous 🎭", score: 1e9, speed: 1e7},
            {name: "Hacker_Pro 💻", score: 1e7, speed: 5e5},
            {name: "ScriptKid 👶", score: 1e4, speed: 1e2}
        ];

        function loadGame() {
            userName = localStorage.getItem('h_user') || '';
            score = Number(localStorage.getItem('h_score')) || 0;
            autoP = Number(localStorage.getItem('h_auto')) || 0;
            if (userName) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.filter = 'none';
                document.getElementById('main-content').style.pointerEvents = 'auto';
                document.getElementById('display-name').innerText = userName.toUpperCase();
                if(userName.toLowerCase() === 'миша') document.getElementById('admin-btn').style.display='block';
                updateUI();
            }
        }
        window.onload = loadGame;

        function updateUI() {
            document.getElementById('score-text').innerText = fmt(score);
            document.getElementById('auto-val').innerText = fmt(autoP);
            document.getElementById('lvl-text').innerText = "LVL: " + Math.floor(Math.sqrt(score/100));

            // Логика соревнования
            let all = [...competitors, {name: userName, score: score}].sort((a,b) => b.score - a.score);
            let myPos = all.findIndex(p => p.name === userName) + 1;
            
            document.getElementById('pos-text').innerText = "#" + myPos;
            let r = "ROOKIE";
            if(myPos === 1) r = "LEGEND 👑";
            else if(myPos === 2) r = "MASTER";
            else if(myPos === 3) r = "PRO";
            document.getElementById('rank-text').innerText = r;

            let html = '';
            all.forEach((p, i) => {
                let me = p.name === userName ? 'my-pos' : '';
                html += `<div class="leader-item ${me}"><span>#${i+1} ${p.name}</span><span>${fmt(p.score)}</span></div>`;
            });
            document.getElementById('leaderboard').innerHTML = html;

            saveGame();
        }

        // Боты тоже копят очки
        setInterval(() => {
            competitors.forEach(bot => bot.score += bot.speed / 10);
            score += autoP / 10;
            updateUI();
        }, 100);

        function fmt(n) {
            if (n >= 1e15) return (n/1e15).toFixed(1)+'Q';
            if (n >= 1e12) return (n/1e12).toFixed(1)+'T';
            if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
            if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
            return Math.floor(n);
        }

        function mineData() { score += clickP; updateUI(); }
        function getRTX(m, p) { autoP += p; updateUI(); }
        function saveGame() {
            localStorage.setItem('h_score', score);
            localStorage.setItem('h_auto', autoP);
            localStorage.setItem('h_user', userName);
        }

        function confirmAccess() {
            let i = document.getElementById('user-login').value.trim();
            if (i.length < 2) return;
            userName = i;
            document.getElementById('login-overlay').style.display='none';
            document.getElementById('main-content').style.filter='none';
            document.getElementById('main-content').style.pointerEvents='auto';
            document.getElementById('display-name').innerText=userName.toUpperCase();
            if(userName.toLowerCase() === 'миша') document.getElementById('admin-btn').style.display='block';
            updateUI();
        }

        // ПЕРЕТАСКИВАНИЕ
        const modal = document.getElementById("admin-modal");
        const header = document.getElementById("admin-header");
        let active = false, currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;

        function dStart(e) {
            let cx = e.type === "touchstart" ? e.touches.clientX : e.clientX;
            let cy = e.type === "touchstart" ? e.touches.clientY : e.clientY;
            initialX = cx - xOffset; initialY = cy - yOffset;
            if (e.target === header) active = true;
        }
        function dMove(e) {
            if (active) {
                e.preventDefault();
                let cx = e.type === "touchmove" ? e.touches.clientX : e.clientX;
                let cy = e.type === "touchmove" ? e.touches.clientY : e.clientY;
                currentX = cx - initialX; currentY = cy - initialY;
                xOffset = currentX; yOffset = currentY;
                modal.style.transform = `translate(${currentX}px, ${currentY}px)`;
            }
        }
        document.addEventListener("touchstart", dStart); document.addEventListener("touchmove", dMove); 
        document.addEventListener("mousedown", dStart); document.addEventListener("mousemove", dMove);
        document.addEventListener("mouseup", () => active = false); document.addEventListener("touchend", () => active = false);

        // МАТРИЦА
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width / 20)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0"; drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random() * 2), i * 20, y * 20);
                if (y * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 50);
    </script>
</body>
</html>
