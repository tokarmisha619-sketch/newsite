<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>HAKCLIKER 3.1</title>
    <style>
        body{font-family:monospace;background:#000;color:#0f0;margin:0;padding:10px;overflow-x:hidden}
        #matrix-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;opacity:0.2}
        #login-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:1000;display:flex;align-items:center;justify-content:center}
        .login-box{border:2px solid #0f0;padding:20px;border-radius:10px;text-align:center;background:#000;box-shadow:0 0 20px #0f0}
        #main-content{filter:blur(15px);transition:1s;pointer-events:none}
        .container{max-width:600px;margin:0 auto;background:rgba(0,0,0,0.9);padding:15px;border:2px solid #0f0;border-radius:10px}
        .box{background:rgba(0,255,0,0.05);padding:15px;border:1px double #0f0;border-radius:8px;margin-bottom:15px;text-align:center}
        #click-btn{width:80px;height:80px;border-radius:50%;border:4px solid #0f0;background:#000;color:#0f0;font-size:2em;cursor:pointer;box-shadow:0 0 15px #0f0;margin:10px}
        button{background:#0f0;color:#000;border:none;padding:10px;font-weight:bold;cursor:pointer;border-radius:5px;text-transform:uppercase;width:100%;margin-top:5px}
        input{background:#000;color:#0f0;border:1px solid #0f0;padding:8px;border-radius:4px;width:90%;text-align:center;margin:5px 0;outline:none}
        .mode-btn{width:45%;font-size:0.7em;display:inline-block;border:1px solid #0f0}
        .active-mode{background:#0f0;color:#000;box-shadow:0 0 10px #0f0}
        .gold-nick { color: #ffcc00 !important; font-weight: bold; text-shadow: 0 0 10px #ffcc00; }
        .leader-item { display: flex; justify-content: space-between; padding: 5px; border-bottom: 1px solid #111; font-size: 0.8em; }
        .my-pos { background: rgba(0,255,0,0.2); color: #fff; }
        #status-module { position: fixed; top: 100px; right: 10px; width: 120px; background: rgba(0,20,40,0.9); border: 2px solid #0f0; padding: 10px; border-radius: 10px; color: #0f0; font-size: 0.6em; text-align: center; box-shadow: 0 0 15px #0f0; z-index: 500; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100% {transform: translateY(0);} 50% {transform: translateY(-10px);} }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>
    
    <div id="status-module">
        <div style="font-weight:bold;">SYSTEM CORE</div>
        <div id="sys-status">v3.1 Online</div>
        <div id="mine-info" style="color:#0a0;">RANK: ROOKIE</div>
    </div>

    <!-- Админка -->
    <div id="admin-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#111; border:3px solid #0f0; padding:15px; z-index:3000; width:280px; text-align:center; box-shadow:0 0 50px #0f0; border-radius:15px;">
        <h3 style="color:#0f0; margin-top:0;">ROOT: МИША</h3>
        <button onclick="getAdminRTX6000()">🔥 RTX 6000</button>
        <button onclick="getAdminRTX7000()">🌌 RTX 7000</button>
        <button onclick="getAdminRTX8000()">👑 RTX 8000</button>
        <button onclick="getAdminRTX9000()">🚀 RTX 9000</button>
        <hr>
        <button onclick="setGoldNick()">👑 ЗОЛОТОЙ НИК</button>
        <button onclick="score = 1e100; updateUI()">💰 INFINITE XP</button>
        <button onclick="localStorage.clear(); location.reload();" style="background:#f00; color:#fff;">🗑️ СБРОС ИГРЫ</button>
        <button onclick="closeAdmin()">ВЫХОД</button>
    </div>

    <div id="login-overlay">
        <div class="login-box">
            <h2>HAKCLIKER 3.1</h2>
            <input type="text" id="user-login" placeholder="ВВЕДИТЕ НИК...">
            <button onclick="confirmAccess()">ВОЙТИ В СИСТЕМУ</button>
        </div>
    </div>

    <div id="main-content" class="container">
        <h2 style="text-align:center;margin:0">ШТАБ: <span id="display-name" onclick="openAdminPanel()" style="cursor:pointer;text-decoration:underline">...</span></h2>
        
        <div class="box">
            <h1 id="score-text">0</h1>
            <div>
                <button id="mode-xp" class="mode-btn active-mode" onclick="setMode('xp')">XP MODE</button>
                <button id="mode-btc" class="mode-btn" onclick="setMode('btc')">BTC MINER</button>
            </div>
            <button onclick="mineData()" id="click-btn">⚡</button>
            <p id="lvl-text" style="color:#fc0;font-weight:bold;margin:5px">LVL: 0</p>
        </div>

        <div class="box" style="border-color:#f7931a">
            <p id="btc-bal" style="font-size:1em; color:#f7931a">0.0000 BTC</p>
            <button onclick="usePromo()" style="background:#222; color:#0f0; font-size:0.7em;">🎁 ПРОМОКОД</button>
        </div>

        <div class="box" style="border-color:#0cf">
            <h4 style="margin:5px">🏆 ТУРНИР ХАКЕРОВ</h4>
            <div id="leaderboard"></div>
        </div>

        <footer style="text-align:center;font-size:0.8em;color:#666;">CREATED BY MISHA | HAKCLIKER 3.1</footer>
    </div>

    <script>
        let score = 0, autoP = 0, clickP = 1, btc = 0, mineMode = 'xp', userName = '', isGold = false;
        let bots = [
            {name: "Elon Musk", score: 1000000000},
            {name: "Anonymous", score: 50000000},
            {name: "Hacker_Pro", score: 1000000},
            {name: "Newbie_1", score: 10000}
        ];

        function loadGame() {
            userName = localStorage.getItem('h_user') || '';
            score = Number(localStorage.getItem('h_score')) || 0;
            autoP = Number(localStorage.getItem('h_auto')) || 0;
            clickP = Number(localStorage.getItem('h_click')) || 1;
            btc = Number(localStorage.getItem('h_btc')) || 0;
            isGold = localStorage.getItem('h_gold') === 'true';
            if (userName) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.filter = 'none';
                document.getElementById('main-content').style.pointerEvents = 'auto';
                document.getElementById('display-name').innerText = userName.toUpperCase();
                updateUI();
            }
        }
        window.onload = loadGame;

        function updateUI() {
            document.getElementById('score-text').innerText = fmt(score);
            document.getElementById('btc-bal').innerText = btc.toFixed(4) + " BTC";
            document.getElementById('lvl-text').innerText = "LVL: " + Math.floor(Math.sqrt(score/100));
            if (isGold) document.getElementById('display-name').classList.add('gold-nick');
            
            updateLeaderboard();
            saveGame();
        }

        function updateLeaderboard() {
            let list = [...bots, {name: userName, score: score}].sort((a,b) => b.score - a.score);
            let html = '';
            list.forEach((player, index) => {
                let isMe = player.name === userName ? 'my-pos' : '';
                html += `<div class="leader-item ${isMe}"><span>#${index+1} ${player.name}</span><span>${fmt(player.score)}</span></div>`;
            });
            document.getElementById('leaderboard').innerHTML = html;
        }

        function fmt(n) {
            if (n >= 1e12) return (n/1e12).toFixed(1)+'T';
            if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
            if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
            return Math.floor(n);
        }

        function mineData() {
            if (mineMode === 'xp') score += clickP;
            else if (Math.random() < 0.1) btc += 0.0001;
            updateUI();
        }

        function saveGame() {
            localStorage.setItem('h_score', score);
            localStorage.setItem('h_auto', autoP);
            localStorage.setItem('h_click', clickP);
            localStorage.setItem('h_btc', btc);
            localStorage.setItem('h_user', userName);
            localStorage.setItem('h_gold', isGold);
        }

        function confirmAccess() {
            let i = document.getElementById('user-login').value.trim();
            if (i.length < 2) return;
            userName = i;
            document.getElementById('login-overlay').style.display='none';
            document.getElementById('main-content').style.filter='none';
            document.getElementById('main-content').style.pointerEvents='auto';
            document.getElementById('display-name').innerText=userName.toUpperCase();
            updateUI();
        }

        function setMode(m) {
            mineMode = m;
            document.getElementById('mode-xp').classList.toggle('active-mode', m === 'xp');
            document.getElementById('mode-btc').classList.toggle('active-mode', m === 'btc');
        }

        setInterval(() => { score += autoP/10; updateUI(); }, 100);

        // Админка
        function getAdminRTX6000() { autoP += 1000000; updateUI(); }
        function getAdminRTX7000() { autoP += 10000000; updateUI(); }
        function getAdminRTX8000() { autoP += 500000000; updateUI(); }
        function getAdminRTX9000() { autoP += 1000000000000; updateUI(); }
        function setGoldNick() { isGold = true; updateUI(); }
        function openAdminPanel() { if (userName.toLowerCase() === 'миша') document.getElementById('admin-modal').style.display = 'block'; }
        function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; }

        // Матрица
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width / 20)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0"; drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random() * 2), i * 20, y * 20);
                if (y * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 50);

        function usePromo() {
            let code = prompt("ВВЕДИТЕ ПРОМОКОД:");
            if (code === "MISHA3.1") { score += 100000000; alert("УСПЕХ!"); }
            updateUI();
        }
    </script>
</body>
</html>
