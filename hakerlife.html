<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2D BeamNG Drive: Мопед Симулятор</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: 'Arial', sans-serif; overflow: hidden; touch-action: none; -webkit-user-select: none; user-select: none; }
        #menu { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: #141414; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; z-index: 100; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        h1 { font-size: 26px; margin: 0 0 10px 0; color: #ff4757; text-shadow: 0 0 10px rgba(255,71,87,0.3); text-align: center; }
        h2 { font-size: 16px; margin: 10px 0 5px 0; color: #a4b0be; text-transform: uppercase; letter-spacing: 1px; }
        #wallet { font-size: 20px; font-weight: bold; color: #2ecc71; background: #1e1e1e; padding: 8px 20px; border-radius: 30px; border: 2px solid #2ecc71; margin-bottom: 10px; box-shadow: 0 0 15px rgba(46,204,113,0.2); }
        .grid-layout { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; max-width: 600px; width: 100%; margin-bottom: 15px; }
        .shop-btn { background: #1e1e1e; color: #f1c40f; border: 2px solid #f1c40f; padding: 10px; font-size: 12px; font-weight: bold; border-radius: 8px; cursor: pointer; text-align: left; transition: 0.2s; }
        .shop-btn:hover { background: rgba(241,196,15,0.1); transform: translateY(-1px); }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; width: 100%; max-width: 600px; }
        .mode-btn, .v-btn { flex: 1; background: #222; color: #bdc3c7; border: 2px solid #444; padding: 10px; font-size: 14px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; text-align: center; }
        .mode-btn.active, .v-btn.active { background: #2ecc71; color: white; border-color: #2ecc71; box-shadow: 0 0 10px rgba(46,204,113,0.3); }
        .maps-grid { display: flex; gap: 10px; justify-content: center; width: 100%; max-width: 600px; }
        .map-btn { flex: 1; background: #2e86de; color: white; border: none; padding: 12px; font-size: 14px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .map-btn:hover { background: #54a0ff; }
        #backToMenu { position: absolute; top: 10px; right: 10px; background: #ff4757; color: white; border: none; padding: 8px 15px; font-size: 14px; border-radius: 5px; cursor: pointer; z-index: 101; display: none; font-weight: bold; }
        #dashboard { position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.85); padding: 12px; border-radius: 10px; border: 2px solid #333; z-index: 10; display: none; min-width: 160px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        #speedometer { font-size: 30px; font-weight: bold; text-align: right; letter-spacing: -1px; }
        #cashCounter { font-size: 15px; color: #2ecc71; font-weight: bold; text-align: right; margin-top: 2px; }
        #fpsCounter { font-size: 11px; color: #888; margin-top: 4px; text-align: right; font-family: monospace; }
        #turboText { font-size: 11px; color: #ff4757; margin-top: 2px; text-align: right; font-weight: bold; text-shadow: 0 0 5px #ff0000; animation: blink 0.5s infinite alternate; }
        #flightStatus { position: absolute; top: 25%; left: 50%; transform: translate(-50%, -50%); font-size: 60px; font-weight: bold; color: #ff3838; text-shadow: 0 0 20px #ff0000; opacity: 0; pointer-events: none; z-index: 10; }
        #boom { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle, rgba(255,69,0,1) 0%, rgba(0,0,0,0) 70%); opacity: 0; pointer-events: none; z-index: 5; }
        #mobileControls { position: absolute; bottom: 20px; left: 0; width: 100vw; display: none; justify-content: space-between; padding: 0 25px; box-sizing: border-box; z-index: 80; }
        .touch-btn { width: 60px; height: 60px; background: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; color: white; font-size: 20px; font-weight: bold; display: flex; justify-content: center; align-items: center; -webkit-tap-highlight-color: transparent; }
        .touch-btn:active { background: rgba(255,255,255,0.35); }
        #btnTurbo { background: rgba(231,76,60,0.25); border-color: #ff4757; font-size: 11px; }
        #orientationWarning { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: #111; z-index: 999; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; box-sizing: border-box; }
        @keyframes blink { from { opacity: 0.3; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="orientationWarning">
    <h3 style="color: #ffa502;">Пожалуйста, переверните устройство!</h3>
    <p>Для игры на телефоне переверните его горизонтально.</p>
</div>

<div id="menu">
    <h1>2D BEAMNG DRIVE: МОПЕД СИМУЛЯТОР</h1>
    
    <div id="wallet">💰 0 руб.</div>

    <h2>КОМПЛЕКТУЮЩИЕ И ТЮНИНГ (SHOP)</h2>
    <div class="grid-layout">
        <button id="up_cpg" class="shop-btn" onclick="buyPart('cpg', 180)">⚙️ ЦПГ Athena 70cc<br><span id="lbl_cpg">Лвл 1 - 180 руб.</span></button>
        <button id="up_carb" class="shop-btn" onclick="buyPart('carb', 120)">⛽ Карбюратор Dellorto 17.5<br><span id="lbl_carb">Лвл 1 - 120 руб.</span></button>
        <button id="up_pipe" class="shop-btn" onclick="buyPart('pipe', 250)">🎺 Выхлоп Саксофон Solo<br><span id="lbl_pipe">Лвл 1 - 250 руб.</span></button>
        <button id="up_var" class="shop-btn" onclick="buyPart('var', 140)">⚡ Вариатор Malossi Multivar<br><span id="lbl_var">Лвл 1 - 140 руб.</span></button>
        <button id="up_clutch" class="shop-btn" onclick="buyPart('clutch', 110)">⛓️ Сцепление Stage6 RT<br><span id="lbl_clutch">Лвл 1 - 110 руб.</span></button>
        <button id="up_brain" class="shop-btn" onclick="buyPart('brain', 200)">🧠 Коммутатор Daytona Red<br><span id="lbl_brain">Лвл 1 - 200 руб.</span></button>
        <button id="up_tyres" class="shop-btn" onclick="buyPart('tyres', 90)">🛞 Резина MITAS Slick<br><span id="lbl_tyres">Лвл 1 - 90 руб.</span></button>
    </div>

    <h2>УСТРОЙСТВО УПРАВЛЕНИЯ</h2>
    <div class="btn-group">
        <button id="modePc" class="mode-btn active" onclick="setDeviceMode('pc')">🖥️ Режим ПК</button>
        <button id="modeMobile" class="mode-btn" onclick="setDeviceMode('mobile')">📱 Режим Телефона</button>
    </div>

    <h2>ВЫБЕРИ СВОЙ МОПЕД</h2>
    <div class="btn-group">
        <button id="vDio" class="v-btn active" onclick="setVehicle('honda_dio')">🛵 Honda Dio</button>
        <button id="vJog" class="v-btn" onclick="setVehicle('yamaha_jog')">🔥 Yamaha Jog</button>
        <button id="vTact" class="v-btn" onclick="setVehicle('honda_tact')">🛵 Honda Tact</button>
    </div>

    <h2>ВЫБЕРИ КАРТУ И СТАРТУЙ</h2>
    <div class="maps-grid">
        <button class="map-btn" onclick="launchGame('autobahn')">1. Пустой автобан</button>
        <button class="map-btn" onclick="launchGame('lemans')">2. Ле-Ман (Холмы)</button>
        <button class="map-btn" onclick="launchGame('chaos')">3. Городской хаос</button>
    </div>
</div>

<button id="backToMenu" onclick="exitToMenu()">В меню</button>

<div id="dashboard">
    <div id="speedometer"><span id="speedVal">0</span> км/ч</div>
    <div id="cashCounter">+0 руб.</div>
    <div id="turboText">СУПЕР ТУРБО 411</div>
    <div id="fpsCounter">FPS: <span id="fpsVal">60</span></div>
</div>

<div id="mobileControls">
    <div class="btn-left-group">
        <div class="touch-btn" id="btnBack">←</div>
        <div class="touch-btn" id="btnUp">↑</div>
        <div class="touch-btn" id="btnDown">↓</div>
    </div>
    <div class="btn-right-group">
        <div class="touch-btn" id="btnTurbo">ТУРБО</div>
        <div class="touch-btn" id="btnGas">→</div>
    </div>
</div>

<div id="flightStatus">ВЗЛЕТ!</div>
<div id="boom"></div>

<script>
    // Аудиосистема 2Т выхлопа "Дзинь-дзинь-дзинь" без внешних файлов
    let audioCtx = null;
    let soundInterval = null;

    function startEngineSound() {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) {}
    }

    function playDzinSound(speed) {
        if (!audioCtx) return;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        // Фирменный металлический лязг двухтактника зависит от выхлопа и скорости
        let pipeLvl = gameData.upgrades.pipe;
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(120 + (speed * 2) + (pipeLvl * 15), audioCtx.currentTime);
        
        // Быстрое затухание для эффекта треска "дзинь"
        gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.06);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.07);
    }

    let gameActive = false;
    let carX = 150, carY = 0, carVx = 0, carVy = 0, carAngle = 0;
    let selectedMap = 'autobahn', isExploded = false;
    let keysActive = {}, controlMode = 'pc', chosenScooter = 'honda_dio';
    let frameCount = 0, lastCalledTime = performance.now(), fps = 60;
    let obstacles = [];
    let groundLineY = 0, sessionCash = 0;

    let gameData = {
        cash: 0,
        upgrades: { cpg: 1, carb: 1, pipe: 1, var: 1, clutch: 1, brain: 1, tyres: 1 }
    };
    
    // Надежное сохранение прогресса
    try {
        if (localStorage.getItem('beamng_mopped_save')) {
            gameData = JSON.parse(localStorage.getItem('beamng_mopped_save'));
        }
    } catch(e) {}

    const scooterSpecs = {
        honda_dio: { maxNormal: 140, turboSpeed: 380, accel: 0.45, color: '#3498db' },
        yamaha_jog: { maxNormal: 210, turboSpeed: 411, accel: 0.70, color: '#e74c3c' },
        honda_tact: { maxNormal: 110, turboSpeed: 320, accel: 0.35, color: '#f1c40f' }
    };

    function saveProgress() {
        localStorage.setItem('beamng_mopped_save', JSON.stringify(gameData));
        syncUi();
    }

    function syncUi() {
        document.getElementById('wallet').textContent = "💰 " + gameData.cash + " руб.";
        const updateText = (id, key, base) => {
            let lvl = gameData.upgrades[key];
            document.getElementById(id).textContent = "Лвл " + lvl + " - " + (lvl * base) + " руб.";
        };
        updateText('lbl_cpg', 'cpg', 180);
        updateText('lbl_carb', 'carb', 120);
        updateText('lbl_pipe', 'pipe', 250);
        updateText('lbl_var', 'var', 140);
        updateText('lbl_clutch', 'clutch', 110);
        updateText('lbl_brain', 'brain', 200);
        updateText('lbl_tyres', 'tyres', 90);
    }

    function buyPart(type, baseCost) {
        let currentLvl = gameData.upgrades[type];
        let currentCost = currentLvl * baseCost;
        if (gameData.cash >= currentCost) {
            gameData.cash -= currentCost;
            gameData.upgrades[type]++;
            saveProgress();
        } else {
            alert("Не хватает рублей на тюнинг мопеда!");
        }
    }

    function setDeviceMode(mode) {
        controlMode = mode;
        document.getElementById('modePc').className = 'mode-btn' + (mode==='pc'?' active':'');
        document.getElementById('modeMobile').className = 'mode-btn' + (mode==='mobile'?' active':'');
        if(mode === 'mobile') handleScreenOrientation();
        else document.getElementById('orientationWarning').style.display = 'none';
    }

    function handleScreenOrientation() {
        if (controlMode === 'mobile' && window.innerHeight > window.innerWidth) {
            document.getElementById('orientationWarning').style.display = 'flex';
        } else {
            document.getElementById('orientationWarning').style.display = 'none';
        }
    }
    window.addEventListener('resize', handleScreenOrientation);

    function setVehicle(vType) {
        chosenScooter = vType;
        document.getElementById('vDio').className = 'v-btn' + (vType==='honda_dio'?' active':'');
        document.getElementById('vJog').className = 'v-btn' + (vType==='yamaha_jog'?' active':'');
        document.getElementById('vTact').className = 'v-btn' + (vType==='honda_tact'?' active':'');
    }

    function generateMapEntities(type) {
        obstacles = [];
        if (type === 'lemans') {
            obstacles.push({x: 1000, type: 'ramp', w: 300, h: 100}, {x: 2600, type: 'ramp', w: 350, h: 140}, {x: 5500, type: 'wall'});
        } else if (type === 'chaos') {
            for(let i=0; i<6; i++) obstacles.push({x: 1200 + i*500, type: 'car', color: i%2===0?'#9b59b6':'#1abc9c'});
            for(let i=0; i<5; i++) obstacles.push({x: 1500 + i*650, type: 'box'});
            obstacles.push({x: 6000, type: 'wall'});
        }
    }

    function launchGame(mapType) {
        startEngineSound();
        selectedMap = mapType;
        gameActive = true;
        
        document.getElementById('menu').style.display = 'none';
        document.getElementById('backToMenu').style.display = 'block';
        document.getElementById('dashboard').style.display = 'block';

        if (controlMode === 'mobile') {
            document.getElementById('mobileControls').style.display = 'flex';
        } else {
            document.getElementById('mobileControls').style.display = 'none';
        }

        canvas = document.createElement('canvas');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        document.body.appendChild(canvas);
        ctxGame = canvas.getContext('2d');

        groundLineY = window.innerHeight - 60;
        carX = 150; carY = groundLineY - 16; 
        carVx = 0; carVy = 0; carAngle = 0; isExploded = false; sessionCash = 0;
        
        generateMapEntities(mapType);
        bindEngineControls();

        // Запуск циклического треска глушителя при езде
        soundInterval = setInterval(() => {
            if(gameActive && !isExploded && (keysActive['ArrowRight'] || keysActive['Space'])) {
                let currentSpeed = Math.floor(carVx * 15);
                playDzinSound(currentSpeed);
            }
        }, 110);

        requestAnimationFrame(coreGameStep);
    }

    function bindEngineControls() {
        window.onkeydown = (e) => { if(controlMode==='pc') keysActive[e.code] = true; if(e.code==='KeyR'&&controlMode==='pc') resetScooterPosition(); };
        window.onkeyup = (e) => { if(controlMode==='pc') keysActive[e.code] = false; };

        const wireTouch = (elementId, simulatedKey) => {
            const targetEl = document.getElementById(elementId);
            if(!targetEl) return;
            targetEl.ontouchstart = (e) => { e.preventDefault(); keysActive[simulatedKey] = true; };
            targetEl.ontouchend = (e) => { e.preventDefault(); keysActive[simulatedKey] = false; };
        };
        wireTouch('btnGas', 'ArrowRight');
        wireTouch('btnBack', 'ArrowLeft');
        wireTouch('btnTurbo', 'Space');
        wireTouch('btnUp', 'ArrowUp');     
        wireTouch('btnDown', 'ArrowDown'); 
    }

    function resetScooterPosition() {
        carX = 150; carY = groundLineY - 16; carVx = 0; carVy = 0; carAngle = 0; isExploded = false;
        document.getElementById('flightStatus').style.opacity = '0';
    }

    function exitToMenu() {
        gameActive = false;
        clearInterval(soundInterval);
        if(canvas) { canvas.remove(); canvas = null; }
        document.getElementById('menu').style.display = 'flex';
        document.getElementById('backToMenu').style.display = 'none';
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('mobileControls').style.display = 'none';
        syncUi();
    }

    function coreGameStep() {
        if(!gameActive) return;

        frameCount++;
        let currentTime = performance.now();
        if (currentTime - lastCalledTime >= 1000) {
            fps = Math.round((frameCount * 1000) / (currentTime - lastCalledTime));
            document.getElementById('fpsVal').textContent = fps;
            frameCount = 0; lastCalledTime = currentTime;
        }

        const base = scooterSpecs[chosenScooter];
        
        // Влияние комплектующих на физику
        let multCpg = 1 + (gameData.upgrades.cpg - 1) * 0.15;
        let multCarb = 1 + (gameData.upgrades.carb - 1) * 0.10;
        let multPipe = 1 + (gameData.upgrades.pipe - 1) * 0.20;
        let multVar = 1 + (gameData.upgrades.var - 1) * 0.12;
        let multClutch = 1 + (gameData.upgrades.clutch - 1) * 0.08;
        let multBrain = 1 + (gameData.upgrades.brain - 1) * 0.10;
        let multTyres = 1 + (gameData.upgrades.tyres - 1) * 0.05;

        // Итоговые характеристики с тюнингом
        let maxLimitKmh = (base.maxNormal * multCpg * multVar * multBrain);
        let finalAcceleration = base.accel * multCarb * multClutch * multPipe;
        let stuntControlPower = 0.016 * (1 + (gameData.upgrades.clutch - 1) * 0.1); 
        let flyWeightForce = 0.45 + (gameData.upgrades.cpg - 1) * 0.05;

        let speedKmh = Math.floor(carVx * 15);

        if (keysActive['Space']) {
            carVx = base.turboSpeed / 15; 
            speedKmh = base.turboSpeed;
            document.getElementById('turboText').style.display = 'block';
            document.getElementById('turboText').textContent = "СУПЕР ТУРБО: " + base.turboSpeed + " КМ/Ч";
        } else {
            document.getElementById('turboText').style.display = 'none';
            if (keysActive['ArrowRight'] && !isExploded && speedKmh < maxLimitKmh) {
                carVx += finalAcceleration * multTyres; 
            }
            if (keysActive['ArrowLeft'] && !isExploded) carVx -= 0.35;
            carVx *= 0.985; 
        }

        carX += carVx;
        carY += carVy;

        // Счетчик заработка рублей
        if (!isExploded && carVx > 1) {
            let addCash = Math.floor(carVx * 0.06);
            if (carY < groundLineY - 35) addCash += 3; 
            sessionCash += addCash;
            gameData.cash += addCash;
            try { localStorage.setItem('beamng_mopped_save', JSON.stringify(gameData)); } catch(e){}
            document.getElementById('cashCounter').textContent = "+" + sessionCash + " руб.";
        }

        let calculatedGroundY = groundLineY - 16;
        let isMovingOnRamp = false;

        obstacles.forEach(obs => {
            if (obs.type === 'ramp' && carX >= obs.x && carX <= obs.x + obs.w) {
                let ratio = (carX - obs.x) / obs.w;
                calculatedGroundY = (groundLineY - 16) - (obs.h * ratio);
                isMovingOnRamp = true;
            }
        });

        // Наклоны (Стант)
        if (!isExploded) {
            let isInAir = carY < calculatedGroundY - 6;
            if (isInAir) {
                if (keysActive['ArrowUp']) carAngle -= 0.045;
                if (keysActive['ArrowDown']) carAngle += 0.045;
            } else {
                if (keysActive['ArrowUp'] && carVx > 1) {
                    carAngle -= stuntControlPower;
                    if (carAngle < -0.85) carAngle = -0.85; 
                } else if (keysActive['ArrowDown']) {
                    carAngle += 0.04;
                    if (carAngle > 0) carAngle = 0;
                } else {
                    if (carAngle < 0) {
                        carAngle += 0.008; // Плавное опускание носа скутера
                        if (carAngle > 0) carAngle = 0;
                    }
                }
            }
        }

        if (speedKmh >= 300 && !isExploded) {
            document.getElementById('flightStatus').style.opacity = '1';
            carVy -= (flyWeightForce * 0.8); 
        } else {
            document.getElementById('flightStatus').style.opacity = '0';
            if (carY < calculatedGroundY) {
                carVy += 0.42; 
            } else {
                let currentRot = Math.abs(carAngle % (Math.PI * 2));
                if (carVy > 6.5 && (currentRot > 1.35 && currentRot < 4.85) && !isExploded) {
                    isExploded = true;
                    document.getElementById('boom').style.opacity = '1';
                    setTimeout(() => document.getElementById('boom').style.opacity = '0', 200);
                    carVy = 0;
                } else {
                    if (isMovingOnRamp && carVx > 4) {
                        carVy = -carVx * 0.52; 
                    } else {
                        carY = calculatedGroundY; 
                        carVy = 0; 
                        if (!keysActive['ArrowUp'] && !keysActive['ArrowDown']) carAngle *= 0.65; 
                    }
                }
            }
        }

        obstacles.forEach(obs => {
            let isHit = false;
            if (obs.type === 'wall' && carX + 35 >= obs.x && carX - 35 <= obs.x + 70 && carY >= groundLineY - 140) isHit = true;
            if (obs.type === 'box' && carX + 35 >= obs.x && carX - 35 <= obs.x + 50 && carY >= groundLineY - 110) isHit = true;
            if (obs.type === 'car' && carX + 35 >= obs.x && carX - 35 <= obs.x + 70 && carY >= groundLineY - 100) isHit = true;
            if (isHit && !isExploded) {
                isExploded = true;
                document.getElementById('boom').style.opacity = '1';
                setTimeout(() => document.getElementById('boom').style.opacity = '0', 200);
            }
        });

        // Графика через Canvas API
        ctxGame.fillStyle = '#1e1e1e';
        ctxGame.fillRect(0, 0, canvas.width, canvas.height);

        ctxGame.save();
        ctxGame.translate(-carX + 200, 0);

        // Покрытие дороги
        ctxGame.fillStyle = '#292929';
        ctxGame.fillRect(0, groundLineY, carX + window.innerWidth * 15, 60);
        ctxGame.fillStyle = '#fff';
        for(let i=0; i<150; i++) ctxGame.fillRect(i * 320, groundLineY + 2, 90, 4);

        // Отрисовка препятствий на карте
        obstacles.forEach(obs => {
            if(obs.type === 'wall') { ctxGame.fillStyle = '#ff4757'; ctxGame.fillRect(obs.x, groundLineY - 140, 65, 140); }
            else if(obs.type === 'box') { ctxGame.fillStyle = '#f1c40f'; ctxGame.fillRect(obs.x, groundY - 50, 45, 45); }
            else if(obs.type === 'ramp') { ctxGame.fillStyle = '#ffa502'; ctxGame.beginPath(); ctxGame.moveTo(obs.x, groundLineY); ctxGame.lineTo(obs.x + obs.w, groundLineY - obs.h); ctxGame.lineTo(obs.x + obs.w, groundLineY); ctxGame.fill(); }
