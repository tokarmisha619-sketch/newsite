<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>⚽ MISHA VIPERSKY №5: ДВОРОВЫЙ ФУТБОЛ</title>
    <style>
        body { font-family: monospace; background: #1a202c; color: #fff; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; overflow: hidden; touch-action: none; }
        .score-board { display: flex; gap: 30px; background: #2d3748; padding: 10px 20px; border: 2px solid #4a5568; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-size: 1.1em; }
        #field-container { position: relative; width: 800px; height: 450px; background: #38a169; border: 5px solid #fff; border-radius: 4px; box-shadow: 0 6px 20px rgba(0,0,0,0.5); cursor: none; }
        canvas { width: 100%; height: 100%; }
        #goal-banner { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); background: rgba(0,0,0,0.85); color: #ecc94b; border: 3px solid #ecc94b; padding: 20px 40px; font-size: 3em; font-weight: bold; border-radius: 10px; text-shadow: 0 0 10px #ecc94b; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none; z-index: 100; text-align: center; }
        .active-goal { transform: translate(-50%, -50%) scale(1) !important; }
    </style>
</head>
<body>

    <!-- ОБНОВЛЕННОЕ ТАБЛО СЧЕТА С НОВЫМ ИМЕНЕМ -->
    <div class="score-board">
        <div>👤 ФУТБОЛИСТ: <span style="color: #ecc94b; font-weight: bold;">Misha Vipersky</span></div>
        <div>🏆 ЗАБИТО ГОЛОВ: <span id="goals-val" style="color: #48bb78; font-weight: bold;">0</span></div>
        <div>🔥 НОМЕР: <span style="color: #63b3ed; font-weight: bold;">5</span></div>
    </div>

    <!-- ФУТБОЛЬНОЕ ПОЛЕ -->
    <div id="field-container">
        <canvas id="football-field" width="800" height="450"></canvas>
        <div id="goal-banner">ГООООЛ! ⚽🔥</div>
    </div>

    <p style="color: #a0aec0; margin-top: 10px; font-size: 0.9em;">Управление: Двигай мышку, чтобы бегать за Misha Vipersky. Обведи защитников и пробей точно в ворота!</p>

    <script>
        const canvas = document.getElementById('football-field');
        const ctx = canvas.getContext('2d');
        const goalBanner = document.getElementById('goal-banner');

        let goalCount = 0;
        let audioCtx = null;

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playSound(freq, duration, type='sine') {
            try {
                initAudio(); if (audioCtx.state === 'suspended') audioCtx.resume();
                let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.03, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        // КЛАСС МЯЧА
        class Ball {
            constructor(x, y) { this.reset(x, y); }
            reset(x, y) {
                this.x = x; this.y = y; this.vx = 0; this.vy = 0; this.radius = 10; this.friction = 0.98;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.vx *= this.friction; this.vy *= this.friction;

                if (this.y - this.radius < 0) { this.y = this.radius; this.vy = -this.vy * 0.6; playSound(300, 0.05); }
                if (this.y + this.radius > canvas.height) { this.y = canvas.height - this.radius; this.vy = -this.vy * 0.6; playSound(300, 0.05); }
                if (this.x - this.radius < 0) { this.x = this.radius; this.vx = -this.vx * 0.6; playSound(300, 0.05); }

                if (this.x + this.radius >= canvas.width) {
                    if (this.y > 150 && this.y < 300) { triggerGoal(); } 
                    else { this.x = canvas.width - this.radius; this.vx = -this.vx * 0.6; playSound(300, 0.05); }
                }
            }
            draw() {
                ctx.save(); ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = "#ffffff"; ctx.fill(); ctx.strokeStyle = "#000000"; ctx.lineWidth = 1.5; ctx.stroke();
                ctx.strokeStyle = "#333"; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(this.x - 6, this.y); ctx.lineTo(this.x + 6, this.y); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(this.x, this.y - 6); ctx.lineTo(this.x, this.y + 6); ctx.stroke();
                ctx.restore();
            }
        }

        // КЛАСС ТВОЕГО НАПАДАЮЩЕГО (MISHA VIPERSKY)
        class Player {
            constructor() {
                this.x = 150; this.y = 225; this.radius = 18;
                this.targetX = 150; this.targetY = 225;
            }
            update() {
                this.x += (this.targetX - this.x) * 0.15;
                this.y += (this.targetY - this.y) * 0.15;
                this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));

                let dx = ball.x - this.x, dy = ball.y - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < this.radius + ball.radius) {
                    let angle = Math.atan2(dy, dx);
                    ball.vx = Math.cos(angle) * 7.5 + (this.x - ball.x) * -0.2;
                    ball.vy = Math.sin(angle) * 7.5 + (this.y - ball.y) * -0.2;
                    playSound(450, 0.08, 'triangle');
                }
            }
            draw() {
                ctx.save(); ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = "#1e3a8a"; ctx.fill(); ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 2; ctx.stroke();
                ctx.fillStyle = "#ecc94b"; ctx.font = "bold 15px monospace"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText("5", this.x, this.y); ctx.restore();
            }
        }

        // КЛАСС ЗАЩИТНИКОВ
        class Defender {
            constructor(startX, startY, speed) {
                this.x = startX; this.y = startY; this.startX = startX; this.startY = startY;
                this.radius = 16; this.speed = speed;
            }
            update() {
                let dx = ball.x - this.x, dy = ball.y - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 5) { this.x += (dx / dist) * this.speed; this.y += (dy / dist) * this.speed; }

                let bDx = ball.x - this.x, bDy = ball.y - this.y;
                if (Math.sqrt(bDx*bDx + bDy*bDy) < this.radius + ball.radius) {
                    let angle = Math.atan2(bDy, bDx);
                    ball.vx = Math.cos(angle) * 4 - 3.5; ball.vy = Math.sin(angle) * 4;
                    playSound(250, 0.06, 'sawtooth');
                }
            }
            draw() {
                ctx.save(); ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = "#e53e3e"; ctx.fill(); ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 1.5; ctx.stroke(); ctx.restore();
            }
        }

        const ball = new Ball(400, 225);
        const player = new Player();
        const defenders = [
            new Defender(550, 120, 1.6),
            new Defender(600, 225, 2.0),
            new Defender(550, 330, 1.8)
        ];

        document.getElementById('field-container').addEventListener('mousemove', (e) => {
            let rect = canvas.getBoundingClientRect();
            player.targetX = (e.clientX - rect.left) * (canvas.width / rect.width);
            player.targetY = (e.clientY - rect.top) * (canvas.height / rect.height);
        });

        function triggerGoal() {
            goalCount += 1; document.getElementById('goals-val').innerText = goalCount;
            playSound(600, 0.1); setTimeout(() => playSound(800, 0.15), 80); setTimeout(() => playSound(1000, 0.4), 160);
            goalBanner.classList.add('active-goal');
            setTimeout(() => {
                goalBanner.classList.remove('active-goal'); ball.reset(400, 225);
                defenders.forEach(d => { d.x = d.startX; d.y = d.startY; });
            }, 1500);
        }

        function drawFieldMarkings() {
            ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(canvas.width / 2, 0); ctx.lineTo(canvas.width / 2, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.arc(canvas.width / 2, canvas.height / 2, 60, 0, Math.PI * 2); ctx.stroke();
            ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.beginPath(); ctx.arc(canvas.width / 2, canvas.height / 2, 4, 0, Math.PI * 2); ctx.fill();
            ctx.strokeRect(canvas.width - 100, 90, 100, 270);
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 4; ctx.strokeRect(canvas.width - 4, 150, 4, 150);
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawFieldMarkings();
            ball.update(); player.update();
            if (goalBanner.className.indexOf('active-goal') === -1) { defenders.forEach(d => d.update()); }
            ball.draw(); defenders.forEach(d => d.draw()); player.draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
