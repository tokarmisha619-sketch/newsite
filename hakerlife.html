<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2D Scooter Stunt: Jog Edition</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: 'Arial', sans-serif; overflow: hidden; touch-action: none; -webkit-user-select: none; user-select: none; }
        #menu { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; overflow-y: auto; padding: 20px 0; box-sizing: border-box; }
        h1 { font-size: 26px; margin: 0 0 10px 0; text-shadow: 0 0 8px #ff4757; color: #ff4757; text-align: center; }
        h2 { font-size: 16px; margin: 12px 0 6px 0; color: #ccc; text-transform: uppercase; letter-spacing: 1px; }
        #wallet { font-size: 20px; font-weight: bold; color: #2ecc71; background: rgba(0,0,0,0.4); padding: 6px 20px; border-radius: 20px; border: 2px solid #2ecc71; margin-bottom: 10px; }
        .block-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 5px; max-width: 600px; }
        .btn-ui { background: #222; color: #bbb; border: 2px solid #333; padding: 8px 16px; font-size: 13px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .btn-ui.active { background: #2ecc71; color: white; border-color: #2ecc71; box-shadow: 0 0 8px rgba(46, 204, 113, 0.4); }
        .btn-shop { border-color: #f1c40f; color: #f1c40f; }
        .btn-map { background: #2e86de; color: white; border: none; padding: 12px 25px; font-size: 15px; font-weight: bold; margin: 4px; border-radius: 6px; cursor: pointer; width: 260px; }
        #backToMenu { position: absolute; top: 10px; right: 10px; background: #ff4757; color: white; border: none; padding: 8px 14px; font-size: 13px; border-radius: 4px; cursor: pointer; z-index: 10; display: none; }
        #dashboard { position: absolute; bottom: 15px; right: 15px; background: rgba(0,0,0,0.85); padding: 10px 15px; border-radius: 8px; border: 2px solid #333; z-index: 10; display: none; min-width: 150px; }
        #speedometer { font-size: 26px; font-weight: bold; text-align: right; font-family: monospace; }
        #cashCounter { font-size: 15px; color: #2ecc71; font-weight: bold; text-align: right; margin-top: 2px; }
        #fpsCounter { font-size: 11px; color: #777; margin-top: 4px; text-align: right; font-family: monospace; }
        #turboText { font-size: 11px; color: #ff4757; margin-top: 2px; text-align: right; font-weight: bold; }
        #soundText { position: absolute; bottom: 90px; left: 20px; font-size: 24px; font-weight: bold; color: #f1c40f; text-shadow: 0 0 10px rgba(241, 196, 15, 0.5); font-style: italic; pointer-events: none; z-index: 9; opacity: 0; }
        #mobileControls { position: absolute; bottom: 15px; left: 0; width: 100vw; display: none; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 80; }
        .control-group { display: flex; gap: 8px; }
        .touch-btn { width: 55px; height: 55px; background: rgba(255, 255, 255, 0.12); border: 2px solid rgba(255, 255, 255, 0.4); border-radius: 50%; color: white; font-size: 20px; font-weight: bold; display: flex; justify-content: center; align-items: center; }
        #orientationWarning { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: #111; z-index: 999; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="orientationWarning">
    <h3>Переверните устройство!</h3>
    <p>Для игры на смартфоне поверните его горизонтально.</p>
</div>

<div id="menu">
    <h1>2D SCOOTER STUNT SIMULATOR</h1>
    <div id="wallet">💰 0 руб.</div>

    <h2>Оригинальные запчасти (Магазин)</h2>
    <div class="block-container">
        <button id="upCylinder" class="btn-ui btn-shop" onclick="buyComponent('cylinder', 150)">🔥 ЦПГ Malossi MHR 70cc</button>
        <button id="upExhaust" class="btn-ui btn-shop" onclick="buyComponent('exhaust', 180)">🎺 Резонатор Yasuni R</button>
        <button id="upCarb" class="btn-ui btn-shop" onclick="buyComponent('carburetor', 120)">⛽ Карб Dell'Orto 19mm</button>
        <button id="upVariator" class="btn-ui btn-shop" onclick="buyComponent('variator', 130)">⚙️ Вариатор Malossi Multivar</button>
        <button id="upStunt" class="btn-ui btn-shop" onclick="buyComponent('stunt', 200)">🏍️ Бугель & Руль Stage6</button>
    </div>

    <h2>Устройство ввода</h2>
    <div class="block-container">
        <button id="modePc" class="btn-ui active" onclick="setDevice('pc')">🖥️ Компьютер (ПК)</button>
        <button id="modeMobile" class="btn-ui" onclick="setDevice('mobile')">📱 Смартфон (Сенсор)</button>
    </div>

    <h2>Выбери свой скутер</h2>
    <div class="block-container">
        <button id="vDio" class="btn-ui active" onclick="setScooter('honda_dio')">🛵 Honda Dio</button>
        <button id="vJog" class="btn-ui" onclick="setScooter('yamaha_jog')">🔥 Yamaha Jog</button>
        <button id="vTact" class="btn-ui" onclick="setScooter('honda_tact')">🛵 Honda Tact</button>
    </div>

    <h2>Выбери трассу гонки</h2>
    <div class="block-container">
        <button class="btn-map" onclick="launchGame('autobahn')">1. Бесконечный автобан (Погоня)</button>
        <button class="btn-map" onclick="launchGame('lemans')">2. Трасса Ле-Ман (Трамплины)</button>
        <button class="btn-map" onclick="launchGame('chaos')">3. Городской хаос (Препятствия)</button>
    </div>
</div>

<button id="backToMenu" onclick="location.reload()">В меню</button>

<div id="soundText">ДРИНЬ-ДРИНЬ-ДРИНЬ!</div>

<div id="dashboard">
    <div id="speedometer"><span id="speedVal">0</span> км/ч</div>
    <div id="cashCounter">+0 руб.</div>
    <div id="turboText">АКТИВИРОВАНА ЗАКИСЬ АЗОТА 🔥</div>
    <div id="fpsCounter">FPS: <span id="fpsVal">60</span></div>
</div>

<div id="mobileControls">
    <div class="control-group">
        <div class="touch-btn" id="btnBack">←</div>
        <div class="touch-btn" id="btnUp">↑</div>
        <div class="touch-btn" id="btnDown">↓</div>
        <div class="touch-btn" id="btnRepair">R</div>
    </div>
    <div class="control-group">
        <div class="touch-btn" id="btnTurbo">НИТРО</div>
        <div class="touch-btn" id="btnGas">→</div>
    </div>
</div>

<script>
    let canvas, ctx;
    let sX = 150, sY = 0, sVx = 0, sVy = 0, sAngle = 0;
    let selectedMap = 'autobahn', isLoopStarted = false;
    let inputs = {}, controlMode = 'pc', currentModel = 'honda_dio';
    let frames = 0, lastTick = performance.now(), currentFps = 60;
    let elements = [], exhaustParticles = [], copCars = [];
    let trackY = 0, earnedCash = 0, sirenTimer = 0, soundTimer = 0;

    let saveState = {
        cash: 0,
        upgrades: { cylinder: 1, exhaust: 1, carburetor: 1, variator: 1, stunt: 1 }
    };
    
    try {
        if (localStorage.getItem('beamng_scooter_v4')) {
            saveState = JSON.parse(localStorage.getItem('beamng_scooter_v4'));
        }
    } catch(e) {}

    const profileSpecs = {
        honda_dio: { baseMax: 65, nitroMax: 155, baseAccel: 0.15, baseColor: '#3498db' },
        yamaha_jog: { baseMax: 70, nitroMax: 165, baseAccel: 0.22, baseColor: '#e74c3c' },
        honda_tact: { baseMax: 60, nitroMax: 145, baseAccel: 0.12, baseColor: '#f1c40f' }
    };

    function save() {
        localStorage.setItem('beamng_scooter_v4', JSON.stringify(saveState));
        refreshUi();
    }

    function refreshUi() {
        document.getElementById('wallet').textContent = "💰 " + saveState.cash + " руб.";
        document.getElementById('upCylinder').textContent = "🔥 Malossi 70cc (Лвл " + saveState.upgrades.cylinder + ") - " + (saveState.upgrades.cylinder * 150) + "р.";
        document.getElementById('upExhaust').textContent = "🎺 Yasuni R (Лвл " + saveState.upgrades.exhaust + ") - " + (saveState.upgrades.exhaust * 180) + "р.";
        document.getElementById('upCarb').textContent = "⛽ Dell'Orto 19mm (Лвл " + saveState.upgrades.carburetor + ") - " + (saveState.upgrades.carburetor * 120) + "р.";
        document.getElementById('upVariator').textContent = "⚙️ Multivar (Лвл " + saveState.upgrades.variator + ") - " + (saveState.upgrades.variator * 130) + "р.";
        document.getElementById('upStunt').textContent = "🏍️ Stage6 Кит (Лвл " + saveState.upgrades.stunt + ") - " + (saveState.upgrades.stunt * 200) + "р.";
    }

    function buyComponent(item, baseCost) {
        let currentLvl = saveState.upgrades[item];
        let calculatedCost = currentLvl * baseCost;
        if (saveState.cash >= calculatedCost) {
            saveState.cash -= calculatedCost;
            saveState.upgrades[item]++;
            save();
        } else {
            alert("Не хватает рублей на покупку тюнинга!");
        }
    }

    function setDevice(type) {
        controlMode = type;
        document.getElementById('modePc').className = 'btn-ui' + (type === 'pc' ? ' active' : '');
        document.getElementById('modeMobile').className = 'btn-ui' + (type === 'mobile' ? ' active' : '');
        if (type === 'mobile') verifyLayout();
        else document.getElementById('orientationWarning').style.display = 'none';
    }

    function verifyLayout() {
        if (controlMode === 'mobile' && window.innerHeight > window.innerWidth) {
            document.getElementById('orientationWarning').style.display = 'flex';
        } else {
            document.getElementById('orientationWarning').style.display = 'none';
        }
    }
    window.addEventListener('resize', verifyLayout);

    function setScooter(model) {
        currentModel = model;
        document.getElementById('vDio').className = 'btn-ui' + (model === 'honda_dio' ? ' active' : '');
        document.getElementById('vJog').className = 'btn-ui' + (model === 'yamaha_jog' ? ' active' : '');
        document.getElementById('vTact').className = 'btn-ui' + (model === 'honda_tact' ? ' active' : '');
    }

    function generateEnvironment(type) {
        elements = [];
        copCars = [];
        
        // Менты теперь едут только сзади, не блокируя дорогу впереди!
        copCars.push({ x: -250, y: trackY - 40, vx: 0, targetOffset: -160 });
        copCars.push({ x: -550, y: trackY - 40, vx: 0, targetOffset: -300 });

        if (type === 'lemans') {
            elements.push({x: 1200, type: 'ramp', w: 350, h: 120}, {x: 3000, type: 'ramp', w: 400, h: 150});
        } else if (type === 'chaos') {
            for(let i=0; i<6; i++) elements.push({x: 1400 + i*600, type: 'car', color: i%2===0?'#9b59b6':'#1abc9c'});
            for(let i=0; i<5; i++) elements.push({x: 1700 + i*750, type: 'box'});
        }
    }

    function launchGame(mapName) {
        if (isLoopStarted) return;
        isLoopStarted = true;
        selectedMap = mapName;

        document.getElementById('menu').style.display = 'none';
        document.getElementById('backToMenu').style.display = 'block';
        document.getElementById('dashboard').style.display = 'block';

        if (controlMode === 'mobile') {
            document.getElementById('mobileControls').style.display = 'flex';
        }

        canvas = document.createElement('canvas');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        document.body.appendChild(canvas);
        ctx = canvas.getContext('2d');

        trackY = window.innerHeight - 60;
        sX = 150; sY = trackY - 16;
        sVx = 0; sVy = 0; sAngle = 0; earnedCash = 0;
        exhaustParticles = [];

        bindInputEvents();
        generateEnvironment(mapName);
        requestAnimationFrame(engineFrame);
    }

    function bindInputEvents() {
        // Очищенная и мгновенная обработка клавиатуры ПК
        window.onkeydown = (e) => {
            if (controlMode !== 'pc') return;
            if (e.code === 'Space') e.preventDefault();
            inputs[e.code] = true;
            if (e.code === 'KeyR') hardReset();
        };
        window.onkeyup = (e) => {
            if (controlMode !== 'pc') return;
            inputs[e.code] = false;
        };

        // Мгновенная сенсорная обработка телефона без лагов
        const configureTouch = (id, mappingKey) => {
            const btn = document.getElementById(id);
            if (!btn) return;
            btn.ontouchstart = (e) => { e.preventDefault(); inputs[mappingKey] = true; };
            btn.ontouchend = (e) => { e.preventDefault(); inputs[mappingKey] = false; };
        };
        configureTouch('btnGas', 'ArrowRight');
        configureTouch('btnBack', 'ArrowLeft');
        configureTouch('btnTurbo', 'Space');
        configureTouch('btnUp', 'ArrowUp');
        configureTouch('btnDown', 'ArrowDown');

        const repairNode = document.getElementById('btnRepair');
        if (repairNode) repairNode.ontouchstart = (e) => { e.preventDefault(); hardReset(); };
    }

    function hardReset() {
        sX = 150; sY = trackY - 16; sVx = 0; sVy = 0; sAngle = 0;
        exhaustParticles = [];
    }

    function engineFrame(currentTime) {
        frames++;
        if (currentTime - lastTick >= 1000) {
            currentFps = Math.round((frames * 1000) / (currentTime - lastTick));
            document.getElementById('fpsVal').textContent = currentFps;
            frames = 0; lastTick = currentTime;
        }

        const stats = profileSpecs[currentModel];
        sirenTimer++;

        let maxAllowedNormal = stats.baseMax + ((saveState.upgrades.cylinder - 1) * 8) + ((saveState.upgrades.variator - 1) * 6);
        let currentAcceleration = stats.baseAccel + ((saveState.upgrades.carburetor - 1) * 0.03) + ((saveState.upgrades.cylinder - 1) * 0.03);
        let dynamicStuntPower = 0.016 + (saveState.upgrades.stunt - 1) * 0.005;
        let flightAltitudeFactor = 0.55 + (saveState.upgrades.exhaust - 1) * 0.05;

        // ИСПРАВЛЕНО: Теперь физическая скорость sVx правильно переводится в displaySpeed и деньги стабильно растут!
        if (inputs['Space']) {
            let nitroTarget = stats.nitroMax / 22;
            if (sVx < nitroTarget) sVx += 0.5;
            else sVx = nitroTarget;
            document.getElementById('turboText').style.display = 'block';
        } else {
            document.getElementById('turboText').style.display = 'none';
            if (inputs['ArrowRight'] && (sVx * 22) < maxAllowedNormal) {
                sVx += currentAcceleration;
            }
            if (inputs['ArrowLeft']) sVx -= 0.3;
            sVx *= 0.985; 
        }

        let displaySpeed = Math.floor(sVx * 22);
        if (displaySpeed < 0) displaySpeed = 0;

        sX += sVx;
        sY += sVy;

        // Движение ментов
        copCars.forEach(cop => {
            let targetX = sX + cop.targetOffset;
            cop.vx = sVx + ((targetX - cop.x) * 0.05);
            cop.x += cop.vx;
            if (sX - cop.x > window.innerWidth * 1.5) cop.x = sX - window.innerWidth;
        });

        // ДРИНЬ-ДРИНЬ ТЕКСТ И СИЗЫЙ ДЫМ
        let soundLabel = document.getElementById('soundText');
        if (inputs['ArrowRight'] || inputs['Space']) {
            soundTimer++;
            soundLabel.style.opacity = (Math.floor(soundTimer / 8) % 2 === 0) ? '1' : '0';
            
            if (Math.random() < 0.4) {
                exhaustParticles.push({
                    x: sX - 42, y: sY - 4, r: 3 + Math.random() * (4 + saveState.upgrades.exhaust * 0.6), o: 0.7,
                    vx: -sVx * 0.5 - (Math.random() * 2), vy: -0.5 - (Math.random() * 2)
                });
            }
        } else {
            soundLabel.style.opacity = '0';
        }

        exhaustParticles.forEach((p, idx) => {
            p.x += p.vx; p.y += p.vy; p.o -= 0.025;
            if (p.o <= 0) exhaustParticles.splice(idx, 1);
        });

        // ИСПРАВЛЕНО: Стабильное и безотказное начисление игровых рублей
        if (sVx > 0.5) {
            let addCash = Math.ceil(sVx * 0.12);
            if (sY < trackY - 35) addCash += 3; // Бонус за вилли/полет
            earnedCash += addCash; 
            saveState.cash += addCash;
            try { localStorage.setItem('beamng_scooter_v4', JSON.stringify(saveState)); } catch(e){}
            document.getElementById('cashCounter').textContent = "+" + earnedCash + " руб.";
        }

        let roadLevel = trackY - 16;
        let isDrivingOnRamp = false;

        elements.forEach(obs => {
            if (obs.type === 'ramp' && sX >= obs.x && sX <= obs.x + obs.w) {
                let ratio = (sX - obs.x) / obs.w;
                roadLevel = (trackY - 16) - (obs.h * ratio);
                isDrivingOnRamp = true;
            }
        });

        // Стант баланс
        if (inputs['ArrowUp']) {
            sAngle -= dynamicStuntPower;
            if (sAngle < -0.85) sAngle = -0.85; 
        } else if (inputs['ArrowDown']) {
            sAngle += 0.045;
            if (sAngle > 0) sAngle = 0;
        } else {
            // Плавное опускание переднего колеса под весом тяжести
            if (sAngle < 0 && sY >= roadLevel - 5) {
                sAngle += 0.006; 
                if (sAngle > 0) sAngle = 0;
            }
        }

        if (sY < roadLevel) {
            sVy += 0.45; 
        } else {
            if (isDrivingOnRamp && sVx > 1) {
                sVy = -sVx * flightAltitudeFactor; 
            } else {
                sY = roadLevel;
                sVy = 0;
                if (!inputs['ArrowUp'] && !inputs['ArrowDown']) sAngle *= 0.65;
            }
        }

        document.getElementById('speedVal').textContent = displaySpeed;
        document.getElementById('speedometer').style.color = (displaySpeed >= 120) ? '#ff4757' : 'white';

        // РЕНДЕР КАДРА С ВЫСОКОЙ СКОРОСТЬЮ ДВИЖЕНИЯ ТРАССЫ
        ctx.fillStyle = '#1e1e1e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        // Динамическая камера следует за мопедом
        ctx.translate(-sX + 220, 0);

        // Реалистичный серый асфальт
        ctx.fillStyle = '#34495e';
        ctx.fillRect(sX - 300, trackY, window.innerWidth + 600, 60);
        ctx.fillStyle = '#fff';
        // Бешеное движение разметки дороги
        let startLine = Math.floor((sX - 500) / 200) * 200;
        for(let i = startLine; i < sX + window.innerWidth + 500; i += 200) {
            ctx.fillRect(i, trackY + 2, 80, 4);
        }

        exhaustParticles.forEach(p => {
            ctx.fillStyle = 'rgba(190, 210, 230, ' + p.o + ')';
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
        });

        elements.forEach(obs => {
            if(obs.type === 'wall') { ctx.fillStyle = '#ff4757'; ctx.fillRect(obs.x, trackY - 140, 70, 140); }
            else if(obs.type === 'box') { ctx.fillStyle = '#f1c40f'; ctx.fillRect(obs.x, trackY - 50, 50, 50); }
            else if(obs.type === 'ramp') { ctx.fillStyle = '#ffa502'; ctx.beginPath(); ctx.moveTo(obs.x, trackY); ctx.lineTo(obs.x + obs.w, trackY - obs.h); ctx.lineTo(obs.x + obs.w, trackY); ctx.fill(); }
            else if(obs.type === 'car') { ctx.fillStyle = obs.color; ctx.fillRect(obs.x, trackY - 40, 70, 40); ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(obs.x+15, trackY, 12, 0, Math.PI*2); ctx.arc(obs.x+55, trackY, 12, 0, Math.PI*2); ctx.fill(); }
        });

        // Менты
        copCars.forEach(cop => {
            ctx.save();
            ctx.translate(cop.x, cop.y);
            ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, 85, 30);
            ctx.fillStyle = '#2e86de'; ctx.fillRect(20, 0, 35, 30); 
            ctx.fillStyle = '#2c3e50'; ctx.fillRect(15, 4, 15, 10); ctx.fillRect(55, 4, 15, 10);
            ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(20, 30, 12, 0, Math.PI*2); ctx.arc(65, 30, 12, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#bdc3c7'; ctx.beginPath(); ctx.arc(20, 30, 5, 0, Math.PI*2); ctx.arc(65, 30, 5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.font = 'bold 9px Arial'; ctx.fillText('ДПС', 30, 18);
            let flashColor = (Math.floor(sirenTimer / 6) % 2 === 0) ? '#ff3838' : '#2e86de';
            ctx.fillStyle = flashColor; ctx.fillRect(35, -8, 15, 8);
            ctx.fillStyle = (flashColor === '#ff3838') ? 'rgba(255, 56, 56, 0.15)' : 'rgba(46, 134, 222, 0.15)';
            ctx.beginPath(); ctx.arc(42, -4, 30, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        });

        // Отрисовка мопеда
        ctx.save();
        ctx.translate(sX, sY);
        ctx.rotate(sAngle);

        ctx.strokeStyle = stats.baseColor; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.moveTo(-20, 0); ctx.lineTo(0, 10); ctx.lineTo(20, 0); ctx.lineTo(25, -35); ctx.stroke();
        ctx.fillStyle = '#111'; ctx.fillRect(15, -38, 15, 5);
        ctx.fillStyle = stats.baseColor; ctx.fillRect(-22, -18, 25, 12);
        ctx.fillStyle = '#222'; ctx.fillRect(-25, -23, 20, 5); 
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.arc(-20, 8, 10, 0, Math.PI * 2); ctx.arc(22, 8, 10, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#bdc3c7';
        ctx.beginPath(); ctx.arc(-20, 8, 4, 0, Math.PI * 2); ctx.arc(22, 8, 4, 0, Math.PI * 2); ctx.fill();

        // Человечек
        ctx.save();
        ctx.translate(-5, -25); 
        ctx.strokeStyle = '#f39c12'; ctx.lineWidth = 4; 
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(8, 20); ctx.lineTo(15, 25); ctx.stroke(); 
        ctx.fillStyle = '#34495e'; ctx.fillRect(-2, 0, 7, 10); 
        ctx.fillStyle = '#e74c3c'; ctx.fillRect(12, 23, 6, 4); 
        ctx.fillStyle = '#fff'; ctx.fillRect(-5, -22, 12, 22); 
        ctx.strokeStyle = '#f39c12'; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(4, -18); ctx.lineTo(22, -13); ctx.stroke();
        ctx.fillStyle = '#f39c12'; ctx.beginPath(); ctx.arc(2, -28, 6, 0, Math.PI * 2);
