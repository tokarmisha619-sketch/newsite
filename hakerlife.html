<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>⚽ MISHA VIPERSKY №5: ДВОРОВЫЙ ФУТБОЛ</title>
    <style>
        body { font-family: monospace; background: #1a202c; color: #fff; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; overflow: hidden; touch-action: none; }
        .score-board { display: flex; gap: 30px; background: #2d3748; padding: 10px 20px; border: 2px solid #4a5568; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-size: 1.1em; }
        #field-container { position: relative; width: 800px; height: 450px; background: #38a169; border: 5px solid #fff; border-radius: 4px; box-shadow: 0 6px 20px rgba(0,0,0,0.5); cursor: none; }
        canvas { width: 100%; height: 100%; }
        #goal-banner { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); background: rgba(0,0,0,0.85); color: #ecc94b; border: 3px solid #ecc94b; padding: 20px 40px; font-size: 3em; font-weight: bold; border-radius: 10px; text-shadow: 0 0 10px #ecc94b; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none; z-index: 100; text-align: center; }
        .active-goal { transform: translate(-50%, -50%) scale(1) !important; }
    </style>
</head>
<body>

    <!-- ТАБЛО СЧЕТА -->
    <div class="score-board">
        <div>👤 КОМАНДА МИШИ: <span id="my-score" style="color: #48bb78; font-weight: bold;">0</span></div>
        <div>🆚 СЧЕТ</div>
        <div>🤖 СОПЕРНИКИ: <span id="enemy-score" style="color: #e53e3e; font-weight: bold;">0</span></div>
    </div>

    <!-- ИГРОВОЕ ПОЛЕ -->
    <div id="field-container">
        <canvas id="football-field" width="800" height="450"></canvas>
        <div id="goal-banner">ГООООЛ! ⚽🔥</div>
    </div>

    <p style="color: #a0aec0; margin-top: 10px; font-size: 0.9em;">Ты управляешь игроком Misha Vipersky (№5). Синие боты (№1, №2, №4, №7) играют за тебя!</p>

    <script>
        const canvas = document.getElementById('football-field');
        const ctx = canvas.getContext('2d');
        const goalBanner = document.getElementById('goal-banner');

        let myGoals = 0;
        let enemyGoals = 0;
        let isLock = false; 
        let audioCtx = null;

        // ЗВУКОВЫЕ ЭФФЕКТЫ
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playSound(freq, duration, type='sine') {
            try {
                initAudio(); if (audioCtx.state === 'suspended') audioCtx.resume();
                let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.03, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        // КЛАСС МЯЧА
        class Ball {
            constructor(x, y) { this.reset(x, y); }
            reset(x, y) {
                this.x = x; this.y = y; this.vx = 0; this.vy = 0; this.radius = 10; this.friction = 0.98;
            }
            update() {
                if (isLock) return;
                this.x += this.vx; this.y += this.vy;
                this.vx *= this.friction; this.vy *= this.friction;

                // Защита от застревания в углах
                if (Math.abs(this.vx) < 0.08 && Math.abs(this.vy) < 0.08) {
                    if (this.x < 35 || this.x > canvas.width - 35 || this.y < 35 || this.y > canvas.height - 35) {
                        this.vx = (canvas.width / 2 - this.x) * 0.03 + (Math.random() - 0.5) * 3;
                        this.vy = (canvas.height / 2 - this.y) * 0.03 + (Math.random() - 0.5) * 3;
                    }
                }

                // Отскоки от верхнего и нижнего бортиков
                if (this.y - this.radius < 0) { this.y = this.radius; this.vy = -this.vy * 0.75; playSound(300, 0.05); }
                if (this.y + this.radius > canvas.height) { this.y = canvas.height - this.radius; this.vy = -this.vy * 0.75; playSound(300, 0.05); }

                // Левые ворота (наши)
                if (this.x - this.radius <= 0) {
                    if (this.y > 150 && this.y < 300) { triggerGoal(false); } 
                    else { this.x = this.radius; this.vx = -this.vx * 0.75; playSound(300, 0.05); }
                }

                // Правые ворота (чужие)
                if (this.x + this.radius >= canvas.width) {
                    if (this.y > 150 && this.y < 300) { triggerGoal(true); } 
                    else { this.x = canvas.width - this.radius; this.vx = -this.vx * 0.75; playSound(300, 0.05); }
                }
            }
            draw() {
                ctx.save(); ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = "#ffffff"; ctx.fill(); ctx.strokeStyle = "#000000"; ctx.lineWidth = 1.5; ctx.stroke();
                ctx.restore();
            }
        }

        // КЛАСС ТВОЕГО ИГРОКА (MISHA VIPERSKY №5)
        class Player {
            constructor() {
                this.x = 150; this.y = 225; this.radius = 18;
                this.targetX = 150; this.targetY = 225;
            }
            update() {
                this.x += (this.targetX - this.x) * 0.15;
                this.y += (this.targetY - this.y) * 0.15;
                this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));

                if (isLock) return;
                let dx = ball.x - this.x, dy = ball.y - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < this.radius + ball.radius) {
                    let angle = Math.atan2(dy, dx);
                    ball.vx = Math.cos(angle) * 9.0;
                    ball.vy = Math.sin(angle) * 9.0;
                    playSound(450, 0.08, 'triangle');
                }
            }
            draw() {
                ctx.save(); ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = "#1e3a8a"; ctx.fill(); ctx.strokeStyle = "#ecc94b"; ctx.lineWidth = 3; ctx.stroke();
                ctx.fillStyle = "#ecc94b"; ctx.font = "bold 15px monospace"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText("5", this.x, this.y); ctx.restore();
            }
            reset() { this.x = 150; this.y = 225; this.targetX = 150; this.targetY = 225; }
        }

        // КЛАСС УМНЫХ БОТОВ
        class AIBot {
            constructor(startX, startY, isTeammate, number, speed, role) {
                this.startX = startX; this.startY = startY;
                this.x = startX; this.y = startY;
                this.radius = 16; this.isTeammate = isTeammate;
                this.number = number; this.speed = speed;
                this.role = role;
            }
            update() {
                if (isLock) return;
                
                let targetX = this.startX;
                let targetY = this.startY;
                let shouldChase = false;

                // Кто куда бежит на поле
                if (this.role === 'gk') {
                    shouldChase = (this.isTeammate ? ball.x < 220 : ball.x > 580) && Math.abs(ball.y - 225) < 140;
                    targetX = this.startX; targetY = shouldChase ? ball.y : 225;
                } else if (this.role === 'def') {
                    shouldChase = this.isTeammate ? ball.x < 450 : ball.x > 350;
                    targetX = shouldChase ? ball.x : this.startX; targetY = shouldChase ? ball.y : this.startY;
                } else if (this.role === 'att') {
                    shouldChase = this.isTeammate ? ball.x > 250 : ball.x < 550;
                    targetX = shouldChase ? ball.x : this.startX; targetY = shouldChase ? ball.y : this.startY;
                }

                let dx = targetX - this.x, dy = targetY - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 5) {
                    this.x += (dx / dist) * this.speed;
                    this.y += (dy / dist) * this.speed;
                }

                // Удары ботов
                let bDx = ball.x - this.x, bDy = ball.y - this.y;
                let bDist = Math.sqrt(bDx*bDx + bDy*bDy);
                if (bDist < this.radius + ball.radius) {
                    let angle = Math.atan2(bDy, bDx);
                    let power = 6.5 + Math.random() * 2.5;
                    
                    if (this.isTeammate) {
                        ball.vx = Math.abs(Math.cos(angle)) * power;
                        ball.vy = Math.sin(angle) * (power * 0.4);
                        playSound(350, 0.06, 'sine');
                    } else {
                        ball.vx = -Math.abs(Math.cos(angle)) * power;
                        ball.vy = Math.sin(angle) * (power * 0.4);
                        playSound(250, 0.06, 'sawtooth');
                    }
                }
            }
            draw() {
                ctx.save(); ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.isTeammate ? "#2b6cb0" : "#e53e3e"; ctx.fill(); 
                ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 1.5; ctx.stroke();
                ctx.fillStyle = "#ffffff"; ctx.font = "bold 12px monospace"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText(this.number, this.x, this.y); ctx.restore();
            }
            reset() { this.x = this.startX; this.y = this.startY; }
        }

        const ball = new Ball(400, 225);
        const player = new Player();

        // НАША КОМАНДА (Ты №5 + 4 бота)
        const teammates = [
            new AIBot(50, 225, true, "1", 2.6, 'gk'),   // Вратарь
            new AIBot(200, 225, true, "2", 2.2, 'def'), // Защитник
            new AIBot(350, 120, true, "4", 2.4, 'att'), // Нападающий верхний
            new AIBot(350, 330, true, "7", 2.4, 'att')  // Нападающий нижний
        ];

        // КОМАНДА ПРОТИВНИКОВ (5 ботов)
        const enemies = [
            new AIBot(750, 225, false, "1", 2.6, 'gk'),
            new AIBot(600, 150, false, "3", 2.2, 'def'),
            new AIBot(600, 300, false, "9", 2.2, 'def'),
            new AIBot(450, 120, false, "10", 2.4, 'att'),
            new AIBot(450, 330, false, "11", 2.4, 'att')
        ];

        document.getElementById('field-container').addEventListener('mousemove', (e) => {
            let rect = canvas.getBoundingClientRect();
            player.targetX = (e.clientX - rect.left) * (canvas.width / rect.width);
            player.targetY = (e.clientY - rect.top) * (canvas.height / rect.height);
        });

        // ФУНКЦИЯ ГОЛА
        function triggerGoal(isMyGoal) {
            if (isLock) return;
            isLock = true;
            
            if (isMyGoal) {
                myGoals += 1; // Засчитываем строго по 1 голу!
                document.getElementById('my-score').innerText = myGoals;
                goalBanner.innerText = "ГООООЛ! ⚽🔥";
                goalBanner.style.color = "#ecc94b";
            } else {
                enemyGoals += 1;
                document.getElementById('enemy-score').innerText = enemyGoals;
                goalBanner.innerText = "ПРОПУСТИЛИ! 😢";
                goalBanner.style.color = "#e53e3e";
            }
            
            goalBanner.classList.add('active-goal');
            playSound(500, 0.1, 'square');
            setTimeout(() => playSound(650, 0.3, 'square'), 120);

            setTimeout(() => {
                goalBanner.classList.remove('active-goal');
                ball.reset(400, 225);
                player.reset();
                teammates.forEach(t => t.reset());
                enemies.forEach(e => e.reset());
                isLock = false;
            }, 1500);
        }

        function drawFieldLines() {
            ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.lineWidth = 3;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath(); ctx.moveTo(canvas.width / 2, 0); ctx.lineTo(canvas.width / 2, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.arc(canvas.width / 2, canvas.height / 2, 60, 0, Math.PI * 2); ctx.stroke();
            ctx.strokeRect(canvas.width - 40, 150, 40, 150); 
            ctx.strokeRect(0, 150, 40, 150); 
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawFieldLines();
            
            player.update(); player.draw();
            ball.update(); ball.draw();
            teammates.forEach(t => { t.update(); t.draw(); });
            enemies.forEach(e => { e.update(); e.draw(); });

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
