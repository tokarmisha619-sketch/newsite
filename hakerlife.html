<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2D Scooter Stunt: 2.5D Night City</title>
    <style>
        body { margin: 0; background: #0b0b1a; color: white; font-family: 'Arial', sans-serif; overflow: hidden; touch-action: none; -webkit-user-select: none; user-select: none; }
        #menu { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: #111122; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; overflow-y: auto; padding: 20px 0; box-sizing: border-box; }
        h1 { font-size: 26px; margin: 0 0 10px 0; text-shadow: 0 0 10px #ff4757; color: #ff4757; text-align: center; }
        h2 { font-size: 14px; margin: 12px 0 6px 0; color: #a4b0be; text-transform: uppercase; letter-spacing: 1px; }
        #wallet { font-size: 20px; font-weight: bold; color: #2ecc71; background: rgba(0,0,0,0.5); padding: 6px 20px; border-radius: 20px; border: 2px solid #2ecc71; margin-bottom: 10px; }
        .block-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 5px; max-width: 600px; }
        .btn-ui { background: #1e1e38; color: #bbb; border: 2px solid #3d3d6b; padding: 8px 16px; font-size: 13px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .btn-ui.active { background: #2ecc71; color: white; border-color: #2ecc71; box-shadow: 0 0 8px rgba(46, 204, 113, 0.4); }
        .btn-shop { border-color: #f1c40f; color: #f1c40f; }
        .btn-map { background: #ff4757; color: white; border: none; padding: 12px 35px; font-size: 16px; font-weight: bold; margin: 10px; border-radius: 6px; cursor: pointer; width: 280px; box-shadow: 0 0 15px rgba(255, 71, 87, 0.4); }
        #backToMenu { position: absolute; top: 10px; right: 10px; background: #ff4757; color: white; border: none; padding: 8px 14px; font-size: 14px; border-radius: 4px; cursor: pointer; z-index: 110; display: none; }
        #dashboard { position: absolute; bottom: 15px; right: 15px; background: rgba(11, 11, 26, 0.9); padding: 10px 15px; border-radius: 8px; border: 2px solid #3d3d6b; z-index: 10; display: none; min-width: 160px; }
        #speedometer { font-size: 26px; font-weight: bold; text-align: right; font-family: monospace; color: #fff; }
        #cashCounter { font-size: 15px; color: #2ecc71; font-weight: bold; text-align: right; margin-top: 2px; }
        #soundIndicator { font-size: 12px; color: #f1c40f; text-align: right; margin-top: 2px; font-weight: bold; }
        #fpsCounter { font-size: 11px; color: #888; margin-top: 4px; text-align: right; font-family: monospace; }
        #turboText { font-size: 11px; color: #ff4757; margin-top: 2px; text-align: right; font-weight: bold; animation: blink 0.3s infinite alternate; }
        #mobileControls { position: absolute; bottom: 15px; left: 0; width: 100vw; display: none; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 80; }
        .control-group { display: flex; gap: 8px; }
        .touch-btn { width: 55px; height: 55px; background: rgba(255, 255, 255, 0.15); border: 2px solid rgba(255, 255, 255, 0.5); border-radius: 50%; color: white; font-size: 20px; font-weight: bold; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        @keyframes blink { from { opacity: 0.3; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="menu">
    <h1>2.5D SCOOTER STUNT SIMULATOR</h1>
    
    <div id="wallet">💰 0 руб.</div>

    <h2>Оригинальные запчасти (Магазин)</h2>
    <div class="block-container">
        <button id="upCylinder" class="btn-ui btn-shop" onclick="buyComponent('cylinder', 150)">🔥 ЦПГ Malossi MHR 70cc</button>
        <button id="upExhaust" class="btn-ui btn-shop" onclick="buyComponent('exhaust', 180)">🎺 Резонатор Yasuni R</button>
        <button id="upCarb" class="btn-ui btn-shop" onclick="buyComponent('carburetor', 120)">⛽ Карб Dell'Orto 19mm</button>
        <button id="upVariator" class="btn-ui btn-shop" onclick="buyComponent('variator', 130)">⚙️ Вариатор Malossi Multivar</button>
        <button id="upStunt" class="btn-ui btn-shop" onclick="buyComponent('stunt', 200)">🏍️ Бугель & Руль Stage6</button>
    </div>

    <h2>Устройство ввода</h2>
    <div class="block-container">
        <button id="modePc" class="btn-ui active" onclick="setDevice('pc')">🖥️ Компьютер (ПК)</button>
        <button id="modeMobile" class="btn-ui" onclick="setDevice('mobile')">📱 Смартфон (Сенсор)</button>
    </div>

    <h2>Выбери свой скутер</h2>
    <div class="block-container">
        <button id="vDio" class="btn-ui active" onclick="setScooter('honda_dio')">🛵 Honda Dio</button>
        <button id="vJog" class="btn-ui" onclick="setScooter('yamaha_jog')">🔥 Yamaha Jog</button>
        <button id="vTact" class="btn-ui" onclick="setScooter('honda_tact')">🛵 Honda Tact</button>
    </div>

    <h2>Запустить нелегальный заезд</h2>
    <button class="btn-map" onclick="launchGame()">🌃 ВЫЕХАТЬ В НОЧНОЙ ГОРОД</button>
</div>

<button id="backToMenu" onclick="location.reload()">В меню</button>

<div id="dashboard">
    <div id="speedometer"><span id="speedVal">0</span> км/ч</div>
    <div id="cashCounter">+0 руб.</div>
    <div id="soundIndicator">ЗВУК: ДРИНЬ-ДРИНЬ 🔊</div>
    <div id="turboText">АКТИВИРОВАНА ЗАКИСЬ АЗОТА 🔥</div>
    <div id="fpsCounter">FPS: <span id="fpsVal">60</span></div>
</div>

<div id="mobileControls">
    <div class="control-group">
        <div class="touch-btn" id="btnBack">←</div>
        <div class="touch-btn" id="btnUp">↑</div>
        <div class="touch-btn" id="btnDown">↓</div>
        <div class="touch-btn" id="btnRepair">R</div>
    </div>
    <div class="control-group">
        <div class="touch-btn" id="btnTurbo">НИТРО</div>
        <div class="touch-btn" id="btnGas">→</div>
    </div>
</div>

<script>
    let canvas, ctx;
    let distanceTravelled = 0, currentSpeed = 0;
    let stuntAngle = 0, stuntVelocity = 0;
    let isLoopStarted = false;
    let inputs = {}, controlMode = 'pc', currentModel = 'honda_dio';
    let frames = 0, lastTick = performance.now(), currentFps = 60;
    let exhaustParticles = [];
    let earnedCash = 0, engineSoundTick = 0, sirenTimer = 0, moneyTimer = 0;

    let saveState = {
        cash: 0,
        upgrades: { cylinder: 1, exhaust: 1, carburetor: 1, variator: 1, stunt: 1 }
    };
    
    try {
        if (localStorage.getItem('scooter_25d_save')) {
            saveState = JSON.parse(localStorage.getItem('scooter_25d_save'));
        }
    } catch(e) {}

    const profileSpecs = {
        honda_dio: { baseMax: 290, nitroMax: 411, baseAccel: 0.8, baseColor: '#3498db' },
        yamaha_jog: { baseMax: 300, nitroMax: 411, baseAccel: 1.1, baseColor: '#e74c3c' },
        honda_tact: { baseMax: 280, nitroMax: 411, baseAccel: 0.6, baseColor: '#f1c40f' }
    };

    function save() {
        localStorage.setItem('scooter_25d_save', JSON.stringify(saveState));
        refreshUi();
    }

    function refreshUi() {
        document.getElementById('wallet').textContent = "💰 " + saveState.cash + " руб.";
        document.getElementById('upCylinder').textContent = "🔥 Malossi 70cc (Лвл " + saveState.upgrades.cylinder + ") - " + (saveState.upgrades.cylinder * 150) + "р.";
        document.getElementById('upExhaust').textContent = "🎺 Yasuni R (Лвл " + saveState.upgrades.exhaust + ") - " + (saveState.upgrades.exhaust * 180) + "р.";
        document.getElementById('upCarb').textContent = "⛽ Dell'Orto 19mm (Лвл " + saveState.upgrades.carburetor + ") - " + (saveState.upgrades.carburetor * 120) + "р.";
        document.getElementById('upVariator').textContent = "⚙️ Multivar (Лвл " + saveState.upgrades.variator + ") - " + (saveState.upgrades.variator * 130) + "р.";
        document.getElementById('upStunt').textContent = "🏍️ Stage6 Кит (Лвл " + saveState.upgrades.stunt + ") - " + (saveState.upgrades.stunt * 200) + "р.";
    }

    function buyComponent(item, baseCost) {
        let calculatedCost = saveState.upgrades[item] * baseCost;
        if (saveState.cash >= calculatedCost) {
            saveState.cash -= calculatedCost;
            saveState.upgrades[item]++;
            save();
        } else {
            alert("Не хватает рублей на покупку тюнинга!");
        }
    }

    function setDevice(type) {
        controlMode = type;
        document.getElementById('modePc').className = 'btn-ui' + (type === 'pc' ? ' active' : '');
        document.getElementById('modeMobile').className = 'btn-ui' + (type === 'mobile' ? ' active' : '');
    }

    function setScooter(model) {
        currentModel = model;
        document.getElementById('vDio').className = 'btn-ui' + (model === 'honda_dio' ? ' active' : '');
        document.getElementById('vJog').className = 'btn-ui' + (model === 'yamaha_jog' ? ' active' : '');
        document.getElementById('vTact').className = 'btn-ui' + (model === 'honda_tact' ? ' active' : '');
    }

    function launchGame() {
        if (isLoopStarted) return;
        isLoopStarted = true;

        document.getElementById('menu').style.display = 'none';
        document.getElementById('backToMenu').style.display = 'block';
        document.getElementById('dashboard').style.display = 'block';

        if (controlMode === 'mobile') {
            document.getElementById('mobileControls').style.display = 'flex';
        }

        canvas = document.createElement('canvas');
        canvas.id = 'gameCanvas';
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        document.body.appendChild(canvas);
        ctx = canvas.getContext('2d');

        distanceTravelled = 0; currentSpeed = 0;
        stuntAngle = 0; stuntVelocity = 0; earnedCash = 0;
        exhaustParticles = [];

        bindInputEvents();
        requestAnimationFrame(engineFrame);
    }

    function bindInputEvents() {
        window.onkeydown = (e) => { if (controlMode === 'pc') { if (e.code === 'Space') e.preventDefault(); inputs[e.code] = true; } };
        window.onkeyup = (e) => { if (controlMode === 'pc') inputs[e.code] = false; };

        const bindBtn = (id, key) => {
            const el = document.getElementById(id);
            if (!el) return;
            el.onpointerdown = (e) => { e.preventDefault(); inputs[key] = true; };
            el.onpointerup = (e) => { e.preventDefault(); inputs[key] = false; };
            el.onpointerout = (e) => { inputs[key] = false; };
        };
        
        bindBtn('btnGas', 'ArrowRight');
        bindBtn('btnBack', 'ArrowLeft');
        bindBtn('btnTurbo', 'Space');
        bindBtn('btnUp', 'ArrowUp');
        bindBtn('btnDown', 'ArrowDown');

        const repairBtn = document.getElementById('btnRepair');
        if (repairBtn) repairBtn.onpointerdown = (e) => { e.preventDefault(); hardReset(); };
    }

    function hardReset() {
        currentSpeed = 0; stuntAngle = 0; stuntVelocity = 0;
        exhaustParticles = [];
    }

    function engineFrame(currentTime) {
        frames++;
        if (currentTime - lastTick >= 1000) {
            currentFps = Math.round((frames * 1000) / (currentTime - lastTick));
            document.getElementById('fpsVal').textContent = currentFps;
            frames = 0; lastTick = currentTime;
        }

        const stats = profileSpecs[currentModel];
        sirenTimer++;
        
        let maxAllowedNormal = stats.baseMax + ((saveState.upgrades.cylinder - 1) * 15);
        let currentAcceleration = stats.baseAccel + ((saveState.upgrades.carburetor - 1) * 0.08);
        let dynamicStuntPower = 0.003 + (saveState.upgrades.stunt - 1) * 0.001;

        if (inputs['Space']) {
            if (currentSpeed < stats.nitroMax) currentSpeed += 4;
            else currentSpeed = stats.nitroMax;
            document.getElementById('turboText').style.display = 'block';
            document.getElementById('soundIndicator').textContent = "ЗВУК: ВВВВВВВВВВВВ 🔥";
        } else {
            document.getElementById('turboText').style.display = 'none';
            if (inputs['ArrowRight'] && currentSpeed < maxAllowedNormal) {
                currentSpeed += currentAcceleration;
                engineSoundTick++;
                if (engineSoundTick % 4 === 0) document.getElementById('soundIndicator').textContent = "ЗВУК: ДЗИНЬ!";
                else if (engineSoundTick % 4 === 2) document.getElementById('soundIndicator').textContent = "ЗВУК: ДРИНЬ!";
            } else {
                currentSpeed *= 0.97; // Инерция замедления
                document.getElementById('soundIndicator').textContent = "ЗВУК: ххххх...";
            }
        }

        distanceTravelled += currentSpeed * 0.05;

        // Генерация 2.5D сизого дыма из выхлопной Stage6
        if (currentSpeed > 5 && Math.random() < 0.4) {
            exhaustParticles.push({
                x: canvas.width / 2 + 10,
                y: canvas.height - 120 + (stuntAngle * 80),
                size: 8,
                opacity: 0.7,
                vx: -2 + Math.random() * 4,
                vy: -Math.random() * 2,
                growth: 0.8 + (currentSpeed * 0.05)
            });
        }

        exhaustParticles.forEach((p, idx) => {
            p.x += p.vx;
            p.y += p.vy;
            p.size += p.growth;
            p.opacity -= 0.02;
            if (p.opacity <= 0) exhaustParticles.splice(idx, 1);
        });

        // Начисление рублей за стант на скорости
        if (currentSpeed > 10) {
            moneyTimer++;
            if (moneyTimer % 12 === 0) {
                let addCash = 50;
                if (stuntAngle > 0.2) addCash += 100; // Жирный бонус за вилли!
                earnedCash += addCash;
                saveState.cash += addCash;
                try { localStorage.setItem('scooter_25d_save', JSON.stringify(saveState)); } catch(e){}
                document.getElementById('cashCounter').textContent = "+" + earnedCash + " руб.";
            }
        }

        // РЕАЛИСТИЧНЫЙ 2.5D СТАНТ КОНТРОЛЬ (ПОДЪЕМ ЭКРАНА)
        if (inputs['ArrowUp'] && currentSpeed > 5) {
            stuntVelocity += dynamicStuntPower;
            if (stuntVelocity > 0.03) stuntVelocity = 0.03;
        } else if (inputs['ArrowDown']) {
            stuntVelocity -= 0.008;
        } else {
            // Плавное падение передка под весом
            if (stuntAngle > 0) {
                stuntVelocity -= 0.0015;
            }
        }

        stuntVelocity *= 0.88; // Гашение рывков
        stuntAngle += stuntVelocity;

        // Фиксация идеального угла станта
        if (stuntAngle > 0.65) { stuntAngle = 0.65; stuntVelocity = 0; }
        if (stuntAngle < 0) { stuntAngle = 0; stuntVelocity = 0; }

        document.getElementById('speedVal').textContent = Math.floor(currentSpeed);
        document.getElementById('speedometer').style.color = (currentSpeed >= 250) ? '#ff4757' : 'white';

        // ОТРИСОВКА 2.5D КАДРА В ЭКРАН
        ctx.fillStyle = '#070714'; // Ночное небо
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        let horizonY = canvas.height * 0.45;

        // 1. Отрисовка Ночного Города (Небоскребы)
        ctx.fillStyle = '#111124';
        for (let i = 0; i < 15; i++) {
            let bWidth = 90 + (i % 3) * 40;
            let bHeight = 150 + (i % 2) * 100;
            let bX = (i * 110 - (distanceTravelled * 0.1)) % (canvas.width + 200) - 100;
            ctx.fillRect(bX, horizonY - bHeight, bWidth, bHeight);
            
            // Неоновые светящиеся окна в домах
            ctx.fillStyle = (i % 2 === 0) ? 'rgba(241, 196, 15, 0.4)' : 'rgba(52, 152, 219, 0.4)';
            ctx.fillRect(bX + 15, horizonY - bHeight + 20, 10, 15);
            ctx.fillRect(bX + 45, horizonY - bHeight + 50, 10, 15);
            ctx.fillStyle = '#111124';
        }

        // 2. Отрисовка 2.5D Дороги уходящей вдаль
        let roadWidthStart = canvas.width * 0.08;
        let roadWidthEnd = canvas.width * 0.75;
        let linesOffset = (distanceTravelled) % 80;

        for (let y = horizonY; y < canvas.height; y += 4) {
            let percent = (y - horizonY) / (canvas.height - horizonY);
            let currentRoadW = roadWidthStart + percent * (roadWidthEnd - roadWidthStart);
            let leftX = (canvas.width / 2) - currentRoadW / 2;

            // Асфальт и обочина
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(leftX, y, currentRoadW, 4);
            ctx.fillStyle = '#141423'; // Трава/земля по бокам
            ctx.fillRect(0, y, leftX, 4);
            ctx.fillRect(leftX + currentRoadW, y, canvas.width - (leftX + currentRoadW), 4);

            // Отрисовка прерывистой разметки по центру в перспективе
            let lineLength = 25 * percent;
            if (Math.floor((y + linesOffset) / 40) % 2 === 0) {
                ctx.fillStyle = '#fff';
                ctx.fillRect(canvas.width / 2 - (2 * percent), y, 4 * percent, 4);
            }
        }

        // 3. 2.5D Частицы сизого дыма накладываются поверх трассы
        exhaustParticles.forEach(p => {
            ctx.fillStyle = 'rgba(150, 170, 200, ' + p.opacity + ')';
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
        });

        // 4. Отрисовка Копов (ДПС) в зеркале заднего вида / На Хвосте сзади
        let copScale = 0.5 + (Math.sin(sirenTimer * 0.05) * 0.03); // Колыхание от погони
        ctx.save();
        ctx.translate(canvas.width / 2 - 120, canvas.height - 180 + (stuntAngle * 40));
        ctx.scale(copScale, copScale);
        
        // Машина ДПС сзади
        ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, 70, 25);
        ctx.fillStyle = '#2e86de'; ctx.fillRect(15, 0, 40, 25);
        ctx.fillStyle = '#111'; ctx.fillRect(8, 25, 12, 6); ctx.fillRect(50, 25, 12, 6);
        // Люстра
        let fColor = (Math.floor(sirenTimer / 4) % 2 === 0) ? '#ff3838' : '#2e86de';
        ctx.fillStyle = fColor; ctx.fillRect(25, -6, 20, 6);
        ctx.fillStyle = fColor === '#ff3838' ? 'rgba(255,56,56,0.15)' : 'rgba(46,134,222,0.15)';
        ctx.beginPath(); ctx.arc(35, -3, 50, 0, Math.PI*2); ctx.fill();
        ctx.restore();

        // 5. Отрисовка Скутера и Человечка из-за спины (Вид от 3-го лица)
        ctx.save();
        // При станте (вилли) руль и передок мопеда поднимаются вверх, перекрывая горизонт
        ctx.translate(canvas.width / 2, canvas.height - 110);
        ctx.scale(1.4, 1.4);

        // Заднее колесо (всегда на асфальте)
        ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(0, 25, 14, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#7f8c8d'; ctx.beginPath(); ctx.arc(0, 25, 6, 0, Math.PI*2); ctx.fill();

        // Рама мопеда, которая поднимается при станте
        ctx.save();
        ctx.rotate(-stuntAngle); // Наклон кузова скутера при вилли!

        // Двигатель вариатор и выхлоп Yasuni
        ctx.fillStyle = '#333'; ctx.fillRect(-15, 10, 25, 12);
        ctx.strokeStyle = '#f39c12'; ctx.lineWidth = 4; // Глушитель
        ctx.beginPath(); ctx.moveTo(-20, 15); ctx.lineTo(-5, 0); ctx.stroke();

        // Сиденье и пластик скутера (Кастомный цвет)
        ctx.fillStyle = stats.baseColor;
        ctx.fillRect(-16, -10, 32, 18);
        ctx.fillStyle = '#222'; ctx.fillRect(-18, -15, 24, 6); // Седло

        // Передний пластик и вилка руля Stage6
        ctx.strokeStyle = stats.baseColor; ctx.lineWidth = 6;
        ctx.beginPath(); ctx.moveTo(10, 0); ctx.lineTo(22, -35); ctx.stroke();
        
        // Руль Stage6
        ctx.fillStyle = '#111'; ctx.fillRect(14, -37, 16, 4);

        // Переднее колесо (Поднимается в воздух при вилли!)
        ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(26, -5, 14, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#7f8c8d'; ctx.beginPath(); ctx.arc(26, -5, 6, 0, Math.PI*2); ctx.fill();

        // 6. Отрисовка Человечка (Райдера) в шортах, футболке и тапках со спины
        ctx.save();
        ctx.translate(-2, -14);
        
        ctx.fillStyle = '#fff'; ctx.fillRect(-10, -26, 20, 26); // Белая футболка
        ctx.fillStyle = '#34495e'; ctx.fillRect(-10, 0, 20, 10); // Синие шорты

        // Ноги по бокам скутера
        ctx.strokeStyle = '#f39c12'; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.moveTo(-6, 8); ctx.lineTo(-8, 28); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(6, 8); ctx.lineTo(8, 28); ctx.stroke();
        ctx.fillStyle = '#e74c3c'; ctx.fillRect(-11, 26, 6, 4); ctx.fillRect(5, 26, 6, 4); // Тапки

        // Голова в ярком шлеме с козырьком
        ctx.fillStyle = '#f39c12'; ctx.beginPath(); ctx.arc(0, -32, 7, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#e74c3c'; ctx.beginPath(); ctx.arc(0, -34, 10, 0, Math.PI*2); ctx.fill(); // Шлем питбайка
        ctx.fillStyle = '#111'; ctx.fillRect(-4, -43, 8, 4); // Козырек кроссовый

        ctx.restore(); // Конец райдера
        ctx.restore(); // Конец рамы мопеда
        ctx.restore(); // Конец общего масштаба скутера

        requestAnimationFrame(engineFrame);
    }

    updateMenuUi();
</script>
</body>
</html>
