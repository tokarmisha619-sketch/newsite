<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
    <title>⚽ MISHA VIPERSKY №5: MOBILE STRIKER</title>
    <style>
        body { font-family: monospace; background: #1a202c; color: #fff; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; overflow: hidden; touch-action: none; -webkit-user-select: none; user-select: none; }
        .menu-bar { display: flex; gap: 15px; margin-bottom: 10px; z-index: 10; }
        .mode-btn { background: #4a5568; color: #fff; border: 2px solid #718096; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-family: monospace; font-weight: bold; transition: all 0.2s; font-size: 0.9em; }
        .mode-btn.active { background: #3182ce; border-color: #63b3ed; box-shadow: 0 0 10px rgba(99,179,237,0.6); }
        .score-board { display: flex; gap: 30px; background: #2d3748; padding: 10px 20px; border: 2px solid #4a5568; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-size: 1.1em; z-index: 10; }
        #field-container { position: relative; width: 800px; height: 450px; background: #38a169; border: 5px solid #fff; border-radius: 4px; box-shadow: 0 6px 20px rgba(0,0,0,0.5); }
        canvas { width: 100%; height: 100%; display: block; }
        #goal-banner { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); background: rgba(0,0,0,0.85); color: #ecc94b; border: 3px solid #ecc94b; padding: 20px 40px; font-size: 3em; font-weight: bold; border-radius: 10px; text-shadow: 0 0 10px #ecc94b; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none; z-index: 100; text-align: center; }
        .active-goal { transform: translate(-50%, -50%) scale(1) !important; }
        
        /* Мобильный джойстик (слева) */
        #joystick-zone { position: fixed; bottom: 30px; left: 30px; width: 110px; height: 110px; background: rgba(255,255,255,0.15); border: 3px solid rgba(255,255,255,0.4); border-radius: 50%; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        #joystick-stick { width: 45px; height: 45px; background: rgba(255,255,255,0.85); border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.4); pointer-events: none; }

        /* Кнопка удара (справа) */
        #kick-btn { position: fixed; bottom: 35px; right: 35px; width: 85px; height: 85px; background: #e53e3e; border: 4px solid #fff; border-radius: 50%; z-index: 1000; display: flex; align-items: center; justify-content: center; font-family: monospace; font-weight: bold; font-size: 1.1em; color: #fff; box-shadow: 0 6px 12px rgba(0,0,0,0.4); text-shadow: 1px 1px 2px #000; cursor: pointer; transition: transform 0.05s; }
        #kick-btn:active { transform: scale(0.9); background: #c53030; }
    </style>
</head>
<body>

    <!-- ВЫБОР РЕЖИМА ИГРЫ -->
    <div class="menu-bar">
        <button id="btn-match" class="mode-btn active" onclick="setGameMode('match')">🏆 МАТЧ 5х5</button>
        <button id="btn-training" class="mode-btn" onclick="setGameMode('training')">🎯 ТРЕНИРОВКА</button>
    </div>

    <!-- ТАБЛО СЧЕТА -->
    <div class="score-board">
        <div>👤 МЫ: <span id="my-score" style="color: #48bb78; font-weight: bold;">0</span></div>
        <div>🆚 СЧЕТ</div>
        <div>🤖 ОНИ: <span id="enemy-score" style="color: #e53e3e; font-weight: bold;">0</span></div>
    </div>

    <!-- ИГРОВОЕ ПОЛЕ -->
    <div id="field-container">
        <canvas id="football-field" width="800" height="450"></canvas>
        <div id="goal-banner">ГООООЛ! ⚽🔥</div>
    </div>

    <!-- ИНТЕРФЕЙС ДЛЯ СМАРТФОНОВ -->
    <div id="joystick-zone">
        <div id="joystick-stick"></div>
    </div>
    <div id="kick-btn">УДАР</div>

    <p style="color: #a0aec0; margin-top: 10px; font-size: 0.85em; text-align: center; padding: 0 10px;">
        На телефоне: бегай джойстиком слева, бей кнопкой справа. На ПК: для удара жми Пробел (Space)!
    </p>

    <script>
        const canvas = document.getElementById('football-field');
        const ctx = canvas.getContext('2d');
        const goalBanner = document.getElementById('goal-banner');
        const stick = document.getElementById('joystick-stick');
        const joystickZone = document.getElementById('joystick-zone');
        const kickBtn = document.getElementById('kick-btn');

        let currentGameMode = 'match'; 
        let myGoals = 0;
        let enemyGoals = 0;
        let isLock = false; 
        let audioCtx = null;

        let isTouching = false;
        let joyX = 0;
        let joyY = 0;

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playSound(freq, duration, type='sine') {
            try {
                initAudio(); if (audioCtx.state === 'suspended') audioCtx.resume();
                let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.03, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        function setGameMode(mode) {
            currentGameMode = mode;
            myGoals = 0; enemyGoals = 0;
            document.getElementById('my-score').innerText = 0;
            document.getElementById('enemy-score').innerText = 0;
            document.getElementById('btn-match').classList.toggle('active', mode === 'match');
            document.getElementById('btn-training').classList.toggle('active', mode === 'training');
            ball.reset(400, 225); player.reset();
            teammates.forEach(t => t.reset()); enemies.forEach(e => e.reset());
        }

        class Ball {
            constructor(x, y) { this.reset(x, y); }
            reset(x, y) { this.x = x; this.y = y; this.vx = 0; this.vy = 0; this.radius = 10; this.friction = 0.98; }
            update() {
                if (isLock) return;
                this.x += this.vx; this.y += this.vy;
                this.vx *= this.friction; this.vy *= this.friction;

                const cornerSize = 45;
                if (this.x < cornerSize && this.y < cornerSize) { this.vx += 0.4; this.vy += 0.4; }
                if (this.x > canvas.width - cornerSize && this.y < cornerSize) { this.vx -= 0.4; this.vy += 0.4; }
                if (this.x < cornerSize && this.y > canvas.height - cornerSize) { this.vx += 0.4; this.vy -= 0.4; }
                if (this.x > canvas.width - cornerSize && this.y > canvas.height - cornerSize) { this.vx -= 0.4; this.vy -= 0.4; }

                if (this.y - this.radius < 0) { this.y = this.radius; this.vy = -this.vy * 0.75; playSound(300, 0.05); }
                if (this.y + this.radius > canvas.height) { this.y = canvas.height - this.radius; this.vy = -this.vy * 0.75; playSound(300, 0.05); }

                if (this.x - this.radius <= 0) {
                    if (this.y > 150 && this.y < 300) { triggerGoal(false); } 
                    else { this.x = this.radius; this.vx = -this.vx * 0.75; playSound(300, 0.05); }
                }
                if (this.x + this.radius >= canvas.width) {
                    if (this.y > 150 && this.y < 300) { triggerGoal(true); } 
                    else { this.x = canvas.width - this.radius; this.vx = -this.vx * 0.75; playSound(300, 0.05); }
                }
            }
            draw() {
                ctx.save(); ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = "#ffffff"; ctx.fill(); ctx.strokeStyle = "#000000"; ctx.lineWidth = 1.5; ctx.stroke();
                ctx.restore();
            }
        }

        class Player {
            constructor() { this.x = 150; this.y = 225; this.radius = 18; this.targetX = 150; this.targetY = 225; this.moveVx = 0; this.moveVy = 0; }
            update() {
                let oldX = this.x;
                let oldY = this.y;

                if (isTouching) {
                    this.x += joyX * 4.5;
                    this.y += joyY * 4.5;
                    this.targetX = this.x;
                    this.targetY = this.y;
                } else {
                    let mDx = this.targetX - this.x;
                    let mDy = this.targetY - this.y;
                    if (Math.sqrt(mDx*mDx + mDy*mDy) > 2) {
                        this.x += mDx * 0.15;
                        this.y += mDy * 0.15;
                    }
                }

                this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));

                this.moveVx = this.x - oldX;
                this.moveVy = this.y - oldY;

                if (isLock) return;
                let dx = ball.x - this.x, dy = ball.y - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < this.radius + ball.radius + 4) {
                    let angle = Math.atan2(dy, dx);
                    let playerSpeed = Math.sqrt(this.moveVx * this.moveVx + this.moveVy * this.moveVy);
                    
                    if (playerSpeed < 0.25) {
                        ball.x = this.x + Math.cos(angle) * (this.radius + ball.radius);
                        ball.y = this.y + Math.sin(angle) * (this.radius + ball.radius);
                        ball.vx = 0; ball.vy = 0;
                    } else {
                        ball.x = this.x + Math.cos(angle) * (this.radius + ball.radius - 1);
                        ball.y = this.y + Math.sin(angle) * (this.radius + ball.radius - 1);
                        ball.vx = this.moveVx * 1.05;
                        ball.vy = this.moveVy * 1.05;
                    }
                }
            }
            
            // ФУНКЦИЯ КНОПКИ БУЦАНИЯ
            kick() {
                if (isLock) return;
                let dx = ball.x - this.x, dy = ball.y - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                // Буцать можно, если мяч находится близко к тебе (в радиусе контроля)
                if (dist < this.radius + ball.radius + 15) {
                    let angle = Math.atan2(dy, dx);
                    // Мощный удар в направлении от игрока к мячу
                    ball.vx = Math.cos(angle) * 14.0; 
                    ball.vy = Math.sin(angle) * 14.0;
                    playSound(550, 0.12, 'triangle');
                }
            }
            
            draw() {
                ctx.save(); ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = "#1e3a8a"; ctx.fill(); ctx.strokeStyle = "#ecc94b"; ctx.lineWidth = 3; ctx.stroke();
                ctx.fillStyle = "#ecc94b"; ctx.font = "bold 15px monospace"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText("5", this.x, this.y); ctx.restore();
            }
            reset() { this.x = 150; this.y = 225; this.targetX = 150; this.targetY = 225; this.moveVx = 0; this.moveVy = 0; }
        }

        class AIBot {
            constructor(startX, startY, isTeammate, number, speed, role) {
                this.startX = startX; this.startY = startY; this.x = startX; this.y = startY;
                this.radius = 16; this.isTeammate = isTeammate; this.number = number; this.speed = speed; this.role = role;
            }
            update(hasBallFocus, allPlayers) {
                if (isLock) return;
                let targetX = this.startX, targetY = this.startY;

                if (this.role === 'gk') {
                    let inZone = this.isTeammate ? ball.x < 200 : ball.x > 580;
                    targetX = this.startX; targetY = inZone ? ball.y : 225;
                    if (targetY < 150) targetY = 150; if (targetY > 300) targetY = 300;
                } else if (hasBallFocus) {
                    targetX = ball.x; targetY = ball.y;
                } else {
                    let ballOffset = (ball.x - 400) * 0.3;
                    targetX = this.startX + ballOffset;
                    targetY = this.startY + (ball.y - this.startY) * 0.2;
                }

                allPlayers.forEach(p => {
                    if (p === this) return;
                    let pDx = this.x - p.x, pDy = this.y - p.y;
                    let pDist = Math.sqrt(pDx*pDx + pDy*pDy);
                    if (pDist < 75) { targetX += (pDx / pDist) * 35; targetY += (pDy / pDist) * 35; }
                });

                let dx = targetX - this.x, dy = targetY - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 5) { this.x += (dx / dist) * this.speed; this.y += (dy / dist) * this.speed; }

                let bDx = ball.x - this.x, bDy = ball.y - this.y;
                if (Math.sqrt(bDx*bDx + bDy*bDy) < this.radius + ball.radius) {
                    let angle = Math.atan2(bDy, bDx);
                    let power = 6.5 + Math.random() * 2.5;
                    if (this.isTeammate) {
                        ball.vx = Math.abs(Math.cos(angle)) * power; ball.vy = Math.sin(angle) * (power * 0.4);
                        playSound(350, 0.06, 'sine');
                    } else {
                        ball.vx = -Math.abs(Math.cos(angle)) * power; ball.vy = Math.sin(angle) * (power * 0.4);
                        playSound(250, 0.06, 'sawtooth');
                    }
                }
            }
            draw() {
                ctx.save(); ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.isTeammate ? "#2b6cb0" : "#e53e3e"; ctx.fill(); 
                ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 1.5; ctx.stroke();
                ctx.fillStyle = "#ffffff"; ctx.font = "bold 12px monospace"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText(this.number, this.x, this.y); ctx.restore();
            }
            reset() { this.x = this.startX; this.y = this.startY; }
        }

        const ball = new Ball(400, 225);
        const player = new Player();

        const teammates = [
            new AIBot(50, 225, true, "1", 1.6, 'gk'),
            new AIBot(220, 225, true, "2", 2.2, 'def'),
            new AIBot(380, 110, true, "4", 2.3, 'att'),
            new AIBot(380, 340, true, "7", 2.3, 'att')
        ];

        const enemies = [
            new AIBot(750, 225, false, "1", 1.6, 'gk'), 
            new AIBot(580, 130, false, "3", 2.2, 'def'),
            new AIBot(580, 320, false, "9", 2.2, 'def'),
            new AIBot(460, 110, false, "10", 2.3, 'att'),
            new AIBot(460, 340, false, "11", 2.3, 'att')
        ];

        // ОБРАБОТКА ДЖОЙСТИКА
        function handleJoystick(e) {
            e.preventDefault();
            if (!e.touches || e.touches.length === 0) return;
            const touch = e.touches[0];
            const rect = joystickZone.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let deltaX = touch.clientX - centerX;
            let deltaY = touch.clientY - centerY;
            let distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
            const maxDistance = 45;

            if (distance > maxDistance) {
                deltaX = (deltaX / distance) * maxDistance;
                deltaY = (deltaY / distance) * maxDistance;
            }

            stick.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
            joyX = deltaX / maxDistance;
            joyY = deltaY / maxDistance;
            isTouching = true;
        }

        joystickZone.addEventListener('touchstart', handleJoystick);
        joystickZone.addEventListener('touchmove', handleJoystick);
        joystickZone.addEventListener('touchend', () => {
            stick.style.transform = 'translate(0px, 0px)';
            joyX = 0; joyY = 0; isTouching = false;
        });

        // СЛУШАТЕЛЬ НАЖАТИЯ НА КНОПКУ УДАРА (Для смартфонов)
        kickBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            player.kick();
        });

        // СЛУШАТЕЛЬ ДЛЯ ПК (Пробел выполняет удар)
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                player.kick();
            }
        });

        document.getElementById('field-container').addEventListener('mousemove', (e) => {
            if (isTouching) return;
            let rect = canvas.getBoundingClientRect();
            player.targetX = (e.clientX - rect.left) * (canvas.width / rect.width);
            player.targetY = (e.clientY - rect.top) * (canvas.height / rect.height);
        });

        function triggerGoal(isMyGoal) {
            if (isLock) return;
            isLock = true;
            if (isMyGoal) {
                myGoals += 1; document.getElementById('my-score').innerText = myGoals;
                goalBanner.innerText = "ГООООЛ! ⚽🔥"; goalBanner.style.color = "#ecc94b";
            } else {
                enemyGoals += 1; document.getElementById('enemy-score').innerText = enemyGoals;
                goalBanner.innerText = "ПРОПУСТИЛИ! 😢"; goalBanner.style.color = "#e53e3e";
            }
            goalBanner.classList.add('active-goal');
            playSound(500, 0.1, 'square'); setTimeout(() => playSound(650, 0.3, 'square'), 120);
            setTimeout(() => {
                goalBanner.classList.remove('active-goal');
                ball.reset(400, 225); player.reset();
                teammates.forEach(t => t.reset()); enemies.forEach(e => e.reset());
                isLock = false;
            }, 1500);
        }

        function drawFieldLines() {
            ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 3;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath(); ctx.moveTo(canvas.width / 2, 0); ctx.lineTo(canvas.width / 2, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.arc(canvas.width / 2, canvas.height / 2, 60, 0, Math.PI * 2); ctx.stroke();
            ctx.strokeRect(canvas.width - 40, 150, 40, 150); ctx.strokeRect(0, 150, 40, 150); 
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawFieldLines();

            ball.update(); ball.draw();
            player.update(); player.draw();

            let activeTeammates = (currentGameMode === 'match') ? teammates : [];
            let activeEnemies = (currentGameMode === 'match') ? enemies : [enemies];

            let allList = [player, ...activeTeammates, ...activeEnemies];

            let closestTeammate = null, minTDist = Infinity;
            let closestEnemy = null, minEDist = Infinity;

            activeTeammates.forEach(t => {
                if (t.role === 'gk') return;
                let d = Math.sqrt((ball.x-t.x)**2 + (ball.y-t.y)**2);
                if (d < minTDist) { minTDist = d; closestTeammate = t; }
            });
            activeEnemies.forEach(e => {
                if (e.role === 'gk') return;
                let d = Math.sqrt((ball.x-e.x)**2 + (ball.y-e.y)**2);
                if (d < minEDist) { minEDist = d; closestEnemy = e; }
            });

            activeTeammates.forEach(t => { t.update(t === closestTeammate, allList); t.draw(); });
            activeEnemies.forEach(e => { e.update(e === closestEnemy, allList); e.draw(); });

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
