<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>2D BeamNG Drive: Скорость, Турбо и FPS</title>
    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #menu {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(20, 20, 20, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        h1 {
            font-size: 38px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #ff4757;
        }
        h2 {
            font-size: 24px;
            margin-top: 20px;
            margin-bottom: 15px;
            color: #bdc3c7;
        }
        .map-btn {
            background: #2e86de;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 20px;
            font-weight: bold;
            margin: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            width: 320px;
        }
        .map-btn:hover {
            background: #54a0ff;
            transform: scale(1.05);
        }
        .color-container {
            display: flex;
            gap: 15px;
        }
        .color-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid white;
            cursor: pointer;
            transition: 0.2s;
        }
        .color-btn:hover, .color-btn.active {
            transform: scale(1.2);
            border-color: #ff4757;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 16px;
            background: rgba(0,0,0,0.7);
            padding: 12px;
            border-radius: 5px;
            pointer-events: none;
            line-height: 1.5;
            z-index: 10;
            display: none;
        }
        #backToMenu {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff4757;
            color: white;
            border: none;
            padding: 8px 15px;
            font-size: 14px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 10;
            display: none;
        }
        #dashboard {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #333;
            z-index: 10;
            display: none;
            min-width: 160px;
        }
        #speedometer {
            font-size: 32px;
            font-weight: bold;
            text-align: right;
        }
        #fpsCounter {
            font-size: 16px;
            color: #2ecc71;
            margin-top: 5px;
            text-align: right;
            font-family: monospace;
        }
        #turboText {
            font-size: 14px;
            color: #54a0ff;
            margin-top: 5px;
            display: none;
            text-align: right;
            font-weight: bold;
        }
        #flightStatus {
            position: absolute;
            top: 30%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            font-weight: bold;
            color: #ff3838;
            text-shadow: 0 0 20px #ff0000;
            opacity: 0;
            transition: opacity 0.1s ease-in-out;
            pointer-events: none;
            z-index: 10;
        }
        #boom {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, rgba(255,69,0,1) 0%, rgba(0,0,0,0) 70%);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s ease-out;
            z-index: 5;
        }
    </style>
    <script src="cloudflare.com"></script>
</head>
<body>

<div id="menu">
    <h1>ВЫБЕРИ КАРТУ ДЛЯ ТЕСТА</h1>
    <button class="map-btn" onclick="startGame('autobahn')">1. Прямой автобан</button>
    <button class="map-btn" onclick="startGame('lemans')">2. Ле-Ман (Холмы)</button>
    <button class="map-btn" onclick="startGame('chaos')">3. Городской хаос</button>

    <h2>ВЫБЕРИ ЦВЕТ МАШИНЫ</h2>
    <div class="color-container">
        <div class="color-btn active" style="background: #bdc3c7;" onclick="selectColor('#bdc3c7', '#95a5a6', this)"></div>
        <div class="color-btn" style="background: #e74c3c;" onclick="selectColor('#e74c3c', '#c0392b', this)"></div>
        <div class="color-btn" style="background: #2ecc71;" onclick="selectColor('#2ecc71', '#27ae60', this)"></div>
        <div class="color-btn" style="background: #2c3e50;" onclick="selectColor('#2c3e50', '#1a252f', this)"></div>
    </div>
</div>

<button id="backToMenu" onclick="location.reload()">В меню</button>

<div id="info">
    <strong>Управление:</strong><br>
    • Стрелка Вправо — Газ<br>
    • Зажми <strong>ПРОБЕЛ</strong> — ТУРБО-УСКОРЕНИЕ 🔥<br>
    • Набери 300 км/ч для взлета!<br>
    • Клавиша <strong>R</strong> — Починить машину
</div>

<div id="dashboard">
    <div id="speedometer"><span id="speedVal">0</span> км/ч</div>
    <div id="turboText">ТУРБО АКТИВНО</div>
    <div id="fpsCounter">FPS: <span id="fpsVal">60</span></div>
</div>

<div id="flightStatus">ВЗЛЕТ!</div>
<div id="boom"></div>

<script>
    const { Engine, Render, Runner, Bodies, Composite, Constraint, Body, Events, Vector } = Matter;

    let engine, render, runner;
    let carParts = [], carConstraints = [], mainBodies = [];
    let isExploded = false, chargedForExplosion = false;
    let car = null;
    const keys = {};

    let carColorBack = '#bdc3c7';
    let carColorFront = '#95a5a6';

    // Переменные для подсчета FPS
    let lastCalledTime;
    let fps;
    let frameCount = 0;
    let fpsInterval = 0;

    function selectColor(colorBack, colorFront, element) {
        carColorBack = colorBack;
        carColorFront = colorFront;
        document.querySelectorAll('.color-btn').forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');
    }

    function initPhysics() {
        engine = Engine.create();
        render = Render.create({
            element: document.body,
            engine: engine,
            options: {
                width: window.innerWidth,
                height: window.innerHeight,
                wireframes: false,
                background: '#222'
            }
        });
        Render.run(render);
        runner = Runner.create();
        Runner.run(runner, engine);
    }

    function buildMap(mapType) {
        const ground = Bodies.rectangle(window.innerWidth * 3, window.innerHeight - 20, window.innerWidth * 15, 40, { isStatic: true, render: { fillStyle: '#444' } });
        Composite.add(engine.world, ground);

        if (mapType === 'autobahn') {
            const finalWall = Bodies.rectangle(window.innerWidth * 5.5, window.innerHeight - 150, 70, 300, { isStatic: true, render: { fillStyle: '#ff4757' } });
            Composite.add(engine.world, finalWall);
            spawnObstacleCar(1800, '#e67e22');
            spawnObstacleCar(3200, '#3498db');
        } 
        else if (mapType === 'lemans') {
            const ramp1 = Bodies.rectangle(1200, window.innerHeight - 55, 250, 70, { isStatic: true, angle: -0.3, render: { fillStyle: '#ffa502' } });
            const ramp2 = Bodies.rectangle(2800, window.innerHeight - 75, 300, 100, { isStatic: true, angle: -0.45, render: { fillStyle: '#ffa502' } });
            Composite.add(engine.world, [ramp1, ramp2]);
        } 
        else if (mapType === 'chaos') {
            for (let i = 0; i < 6; i++) {
                spawnObstacleCar(1200 + i * 500, i % 2 === 0 ? '#9b59b6' : '#1abc9c');
            }
            for (let i = 0; i < 5; i++) {
                let box = Bodies.rectangle(1500 + i * 650, window.innerHeight - 80, 50, 80, { render: { fillStyle: '#f1c40f' } });
                Composite.add(engine.world, box);
            }
        }
    }

    function spawnObstacleCar(x, color) {
        let y = window.innerHeight - 80;
        let bBack = Bodies.rectangle(x, y, 60, 25, { render: { fillStyle: color } });
        let bFront = Bodies.rectangle(x + 40, y + 2, 40, 20, { render: { fillStyle: color } });
        let wA = Bodies.circle(x - 15, y + 20, 15, { render: { fillStyle: '#111' } });
        let wB = Bodies.circle(x + 35, y + 20, 15, { render: { fillStyle: '#111' } });
        let c1 = Constraint.create({ bodyA: bBack, bodyB: bFront, stiffness: 0.3, render: { visible: false } });
        let c2 = Constraint.create({ bodyA: bBack, bodyB: wA, stiffness: 0.5, render: { visible: false } });
        let c3 = Constraint.create({ bodyA: bFront, bodyB: wB, stiffness: 0.5, render: { visible: false } });
        Composite.add(engine.world, [bBack, bFront, wA, wB, c1, c2, c3]);
    }

    function spawnPlayerCar() {
        carParts.forEach(part => Composite.remove(engine.world, part));
        carConstraints.forEach(c => Composite.remove(engine.world, c));
        
        carParts = []; carConstraints = []; mainBodies = [];
        isExploded = false; chargedForExplosion = false;
        document.getElementById('speedometer').style.color = 'white';
        document.getElementById('flightStatus').style.opacity = '0';
        document.getElementById('turboText').style.display = 'none';

        const carX = 150;
        const carY = window.innerHeight - 100;

        const bodyBack = Bodies.rectangle(carX, carY, 90, 20, { group: -1, render: { fillStyle: carColorBack } });
        const bodyFront = Bodies.rectangle(carX + 70, carY + 2, 60, 16, { group: -1, render: { fillStyle: carColorFront } });
        const exhaust = Bodies.rectangle(carX - 50, carY, 10, 8, { isSensor: true, group: -1, render: { fillStyle: 'rgba(0,0,0,0)' } });

        const wheelA = Bodies.circle(carX - 25, carY + 15, 18, { friction: 0.9, density: 0.03, render: { fillStyle: '#111' } });
        const wheelB = Bodies.circle(carX + 55, carY + 15, 18, { friction: 0.9, density: 0.03, render: { fillStyle: '#111' } });

        const spring1 = Constraint.create({ bodyA: bodyBack, bodyB: bodyFront, pointA: { x: 45, y: -5 }, pointB: { x: -30, y: -5 }, stiffness: 0.2, render: { strokeStyle: '#fff' } });
        const spring2 = Constraint.create({ bodyA: bodyBack, bodyB: bodyFront, pointA: { x: 45, y: 5 }, pointB: { x: -30, y: 5 }, stiffness: 0.2, render: { strokeStyle: '#fff' } });
        const axelA = Constraint.create({ bodyA: bodyBack, bodyB: wheelA, stiffness: 0.4, render: { strokeStyle: '#555' } });
        const axelB = Constraint.create({ bodyA: bodyFront, bodyB: wheelB, stiffness: 0.4, render: { strokeStyle: '#555' } });
        const exhaustConnect = Constraint.create({ bodyA: bodyBack, bodyB: exhaust, pointA: { x: -45, y: 5 }, pointB: { x: 0, y: 0 }, stiffness: 1, render: { visible: false } });

        mainBodies = [bodyBack, bodyFront, wheelA, wheelB, exhaust];
        carParts = [...mainBodies];
        carConstraints = [spring1, spring2, axelA, axelB, exhaustConnect];

        Composite.add(engine.world, [...carParts, ...carConstraints]);
        return { wheelA, wheelB, bodyFront, bodyBack, exhaust };
    }

    function startGame(mapType) {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('info').style.display = 'block';
        document.getElementById('backToMenu').style.display = 'block';
        document.getElementById('dashboard').style.display = 'block';

        initPhysics();
        buildMap(mapType);
        car = spawnPlayerCar();
        setupEvents();
        
        // Запуск счетчика кадров (FPS)
        lastCalledTime = performance.now();
        requestAnimationFrame(updateFps);
    }

    // Функция измерения реального FPS
    function updateFps(now) {
        if (document.getElementById('dashboard').style.display === 'none') return;
        
        frameCount++;
        fpsInterval = now - lastCalledTime;
        
        if (fpsInterval >= 1000) {
            fps = Math.round((frameCount * 1000) / fpsInterval);
            document.getElementById('fpsVal').textContent = fps;
            frameCount = 0;
            lastCalledTime = now;
        }
        requestAnimationFrame(updateFps);
    }

    function setupEvents() {
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') e.preventDefault();
            keys[e.code] = true;
            if (e.code === 'KeyR') car = spawnPlayerCar();
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        Events.on(engine, 'beforeUpdate', () => {
            if (isExploded || !car) return;

            const speedKmh = Math.floor(Vector.magnitude(car.bodyFront.velocity) * 35); 
            document.getElementById('speedVal').textContent = speedKmh;

            if (speedKmh >= 300) {
                chargedForExplosion = true;
                document.getElementById('speedometer').style.color = '#ff4757';
            }

            if (keys['ArrowRight']) {
                Body.setAngularVelocity(car.wheelA, 0.95);
                Body.setAngularVelocity(car.wheelB, 0.95);
                Body.applyForce(car.bodyBack, car.bodyBack.position, { x: 0.08, y: 0 });
            }

            if (keys['Space']) {
                document.getElementById('turboText').style.display = 'block';
                car.exhaust.render.fillStyle = '#00a8ff';
                Body.applyForce(car.bodyBack, car.bodyBack.position, { x: 0.28, y: 0 });
                Body.setAngularVelocity(car.wheelA, 1.5);
                Body.setAngularVelocity(car.wheelB, 1.5);
            } else {
                document.getElementById('turboText').style.display = 'none';
                if (car && car.exhaust) car.exhaust.render.fillStyle = 'rgba(0,0,0,0)';
            }

            if (speedKmh >= 300) {
                document.getElementById('flightStatus').style.opacity = '1';
                Body.applyForce(car.bodyFront, car.bodyFront.position, { x: 0, y: -0.18 });
                Body.applyForce(car.bodyBack, car.bodyBack.position, { x: 0, y: 0.06 });
            } else {
                document.getElementById('flightStatus').style.opacity = '0';
            }
            
            if (keys['ArrowLeft']) {
                Body.setAngularVelocity(car.wheelA, -0.2);
                Body.setAngularVelocity(car.wheelB, -0.2);
            }

            Render.lookAt(render, {
                min: { x: car.bodyBack.position.x - 300, y: car.bodyBack.position.y - 450 },
                max: { x: car.bodyBack.position.x + 700, y: car.bodyBack.position.y + 150 }
            });
        });

        Events.on(engine, 'collisionStart', (event) => {
            if (chargedForExplosion && !isExploded) {
                const pairs = event.pairs;
                for (let i = 0; i < pairs.length; i++) {
                    if (mainBodies.includes(pairs[i].bodyA) || mainBodies.includes(pairs[i].bodyB)) {
                        triggerExplosion();
                        break;
                    }
                }
            }
        });
    }

    function triggerExplosion() {
        isExploded = true;
        chargedForExplosion = false;
        document.getElementById('flightStatus').style.opacity = '0';
        document.getElementById('turboText').style.display = 'none';

        const boomOverlay = document.getElementById('boom');
        boomOverlay.style.opacity = '1';
        setTimeout(() => boomOverlay.style.opacity = '0', 300);

        carConstraints.forEach(c => Composite.remove(engine.world, c));
        mainBodies.forEach(body => {
            const forceMagnitude = 0.5 * body.mass;
            Body.applyForce(body, body.position, {
                x: (Math.random() - 0.4) * forceMagnitude,
                y: (Math.random() - 0.9) * forceMagnitude
            });
            Body.setAngularVelocity(body, (Math.random() - 0.5) * 0.9);
        });
    }
</script>

</body>
</html>
