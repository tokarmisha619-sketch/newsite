<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GTA 2D Retro Prototype</title>
    <style>
        body { margin: 0; background: #222; color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        canvas { background: #34495e; border: 4px solid #2c3e50; box-shadow: 0 0 20px rgba(0,0,0,0.6); cursor: crosshair; }
        .hud { width: 800px; display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="hud">
        <div id="wantedDisplay">РОЗЫСК: 🚨</div>
        <div id="scoreDisplay">ЛИКВИДИРОВАНО: 0</div>
    </div>
    <canvas id="gtaCanvas" width="800" height="550"></canvas>
    <div style="margin-top: 10px; color: #bbb; text-align: center;">
        Перемещение: <b>W, A, S, D</b> | Поворот: <b>Мышь</b> | Стрельба: <b>Левая кнопка мыши (ЛКМ)</b>
    </div>

<script>
const canvas = document.getElementById("gtaCanvas");
const ctx = canvas.getContext("2d");

// Состояние игры
let score = 0;
let keys = {};
let mouse = { x: 0, y: 0 };

// Игрок (Угонщик / Наемник)
const player = {
    x: 400,
    y: 400,
    radius: 15,
    speed: 3,
    angle: 0
};

// Массивы объектов
let bullets = [];
let enemies = [];
// Городские здания (препятствия)
const buildings = [
    { x: 100, y: 100, width: 150, height: 150 },
    { x: 550, y: 100, width: 150, height: 150 },
    { x: 320, y: 220, width: 160, height: 100 }
];

// Отслеживание клавиатуры и мыши
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);
canvas.addEventListener("mousemove", e => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
});

// Стрельба по клику
canvas.addEventListener("mousedown", e => {
    if (e.button === 0) { // ЛКМ
        const speed = 7;
        bullets.push({
            x: player.x + Math.cos(player.angle) * player.radius,
            y: player.y + Math.sin(player.angle) * player.radius,
            vx: Math.cos(player.angle) * speed,
            vy: Math.sin(player.angle) * speed,
            radius: 3
        });
    }
});

// Спавн полиции / врагов
function spawnEnemy() {
    const sides = [
        { x: Math.random() * canvas.width, y: -20 },
        { x: Math.random() * canvas.width, y: canvas.height + 20 },
        { x: -20, y: Math.random() * canvas.height },
        { x: canvas.width + 20, y: Math.random() * canvas.height }
    ];
    const spawnPoint = sides[Math.floor(Math.random() * sides.length)];
    
    enemies.push({
        x: spawnPoint.x,
        y: spawnPoint.y,
        radius: 12,
        speed: 1.5 + Math.random() * 1
    });
    
    // Частота спавна зависит от счета (уровня розыска)
    setTimeout(spawnEnemy, Math.max(400, 2000 - score * 100));
}
setTimeout(spawnEnemy, 1000);

// Проверка столкновения круг-прямоугольник (для зданий)
function checkCircleRectCollision(circle, rect) {
    let closestX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.width));
    let closestY = Math.max(rect.y, Math.min(circle.y, rect.y + rect.height));
    let distX = circle.x - closestX;
    let distY = circle.y - closestY;
    let distance = Math.sqrt((distX * distX) + (distY * distY));
    return distance < circle.radius;
}

// Логика обновлений
function update() {
    let nextX = player.x;
    let nextY = player.y;

    // Считаем вектор движения
    if (keys["w"]) nextY -= player.speed;
    if (keys["s"]) nextY += player.speed;
    if (keys["a"]) nextX -= player.speed;
    if (keys["d"]) nextX += player.speed;

    // Проверка коллизий игрока со зданиями (по оси X и Y отдельно для скольжения)
    let collisionX = false;
    let collisionY = false;
    for (let b of buildings) {
        if (checkCircleRectCollision({ x: nextX, y: player.y, radius: player.radius }, b)) collisionX = true;
        if (checkCircleRectCollision({ x: player.x, y: nextY, radius: player.radius }, b)) collisionY = true;
    }

    if (!collisionX && nextX > player.radius && nextX < canvas.width - player.radius) player.x = nextX;
    if (!collisionY && nextY > player.radius && nextY < canvas.height - player.radius) player.y = nextY;

    // Поворот игрока к прицелу мыши
    player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);

    // Движение пуль
    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.x += b.vx;
        b.y += b.vy;

        // Удаление при выходе за экран
        if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
            bullets.splice(i, 1);
            continue;
        }

        // Разрушение пули о здания
        for (let block of buildings) {
            if (b.x > block.x && b.x < block.x + block.width && b.y > block.y && b.y < block.y + block.height) {
                bullets.splice(i, 1);
                break;
            }
        }
    }

    // Поведение врагов (ИИ копов)
    for (let i = enemies.length - 1; i >= 0; i--) {
        let e = enemies[i];
        let angleToPlayer = Math.atan2(player.y - e.y, player.x - e.x);
        
        // Копы бегут напрямую к игроку
        e.x += Math.cos(angleToPlayer) * e.speed;
        e.y += Math.sin(angleToPlayer) * e.speed;

        // Попадание пули во врага
        for (let j = bullets.length - 1; j >= 0; j--) {
            let b = bullets[j];
            let dist = Math.sqrt((b.x - e.x)**2 + (b.y - e.y)**2);
            if (dist < e.radius + b.radius) {
                enemies.splice(i, 1);
                bullets.splice(j, 1);
                score++;
                document.getElementById("scoreDisplay").innerText = "ЛИКВИДИРОВАНО: " + score;
                
                // Динамическое обновление звезд розыска
                let stars = Math.min(6, Math.floor(score / 5) + 1);
                document.getElementById("wantedDisplay").innerText = "РОЗЫСК: " + "🚨".repeat(stars);
                break;
            }
        }
    }
}

// Отрисовка
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. Рисуем дороги / здания (Текстура города)
    ctx.fillStyle = "#7f8c8d"; // Цвет асфальта вокруг зданий
    ctx.fillRect(0,0, canvas.width, canvas.height);

    ctx.fillStyle = "#2c3e50"; // Цвет бетонных кварталов
    for (let b of buildings) {
        ctx.fillRect(b.x, b.y, b.width, b.height);
        ctx.strokeStyle = "#1a252f";
        ctx.lineWidth = 4;
        ctx.strokeRect(b.x, b.y, b.width, b.height);
    }

    // 2. Рисуем пули трассирующими линиями
    ctx.fillStyle = "#f1c40f";
    for (let b of bullets) {
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
        ctx.fill();
    }

    // 3. Рисуем копов (Красные круги с направлением)
    ctx.fillStyle = "#e74c3c";
    for (let e of enemies) {
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
        ctx.fill();
    }

    // 4. Рисуем игрока (Скины / Слои)
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.angle);

    // Руки / Оружие игрока
    ctx.fillStyle = "#f39c12";
    ctx.fillRect(10, 5, 15, 6); // Ствол автомата направлен вперед

    // Тело игрока
    ctx.fillStyle = "#2ecc71"; // Зеленая куртка (в стиле Си-Джея или Томми)
    ctx.beginPath();
    ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
    ctx.fill();

    // Голова
    ctx.fillStyle = "#ffdbac";
    ctx.beginPath();
    ctx.arc(0, 0, player.radius * 0.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
